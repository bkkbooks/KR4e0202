body:
  text: 讀書後巻四明王世貞撰書三蘓文後明允子瞻俱善持論而明允尤雄勁有氣力獨其好勝而多騁不甚曉事體考故實而輕為可愕可喜之談蓋自戰國中得之子瞻殊爽朗其論䇿沾溉後人甚多記敘之類順流而易竟不若歐陽之舒婉然中多警儁語騷賦非古而超然𤣥著所以收名甚易吾嘗謂子瞻非淺于經術者其少之所以不典則明允之餘習晩之所以不純則葱嶺之緒言然而得是二益亦不小也子由稍近理故文彩不能如父兄晚益近理故益不如然而不失為佳子弟也四家之文無論已其學則子瞻最博子厚次之退之又次之永叔狹矣書老蘇丈後明允晩而始嚮學且僻處西裔無師友之淵源與琢劘之助以故于六經雞肋耳而其學僅戰國䇿史記班范諸書雖佛老莊列之言亦未之考索也夫以明允之雞肋六經則當寘而弗論可也而何至以其私臆而窺聖人之心又以勢之所不得已者而為聖人之作用使六經之道下而與百家諸子等且有詆譴徃古多深文而不中情事其建白置措必權術而亡益治亂且夫辨姦一論其驗介甫固若蓍蔡然亦介甫自有以驗之彼夫口孔老之言而身夷齊之行即使造作語言私立名字衣巨盧食犬彘囚首垢面而談詩書何以知其必用用之何以知其必為天下患也或以明允在永叔席嘗與介甫押而字韵詩而屈或曰韓富與永叔揚明允不容口而介甫獨不及故恨之或曰明允未嘗作此文也子瞻後見介甫之亂政而擬之以歸名于明允也吾謂皆不足論即果明允作而介甫之報之摘其生平所著書而比之章惇王韶胡不可或又曰惇韶介甫之所喜宜其不以惡明允也雖然明允天下才也使其心術正而少得賢師友以經學琢劘之其雄勁不亦奪永叔而掩子瞻也哉書蘇詩後蘇長公之詩在當時天下爭趣之若諸侯王之求封于西楚一轉首而不能無異議至其後則若垓下之戰正統離而不再屬今雖有好之者亦不敢公言于人其厄亦甚矣余晩而頗不以為然彼見夫盛唐之詩格極高調極美而不能多有不足以酬物而盡變故獨于少陵氏而有合焉所以弗獲如少陵者才有餘而不能制其横氣有餘而不能汰其濁角韻則險而不求妥鬬事則逞而不避粗所謂武庫中器利鈍森然誠有以切中其弊者然當其所合作亦自有斐然而不可掩無論蘇公即黄魯直傾竒峭峻亦多得之少陵特單薄無深味蹊逕宛然故離而益相逺耳魯直不足觀也莊生曰神竒化而臭腐蘇公時自犯之臭腐復為神竒則在善觀蘇詩者讀皇極經世觀物内篇邵子之皇極經世書吾所不敢輕言而中有扞格而不敢輕信者如觀物篇天生于動地生于靜天動地靜誰不知之第一氣之分自然輕清上浮重濁下墮上浮則自動下墮則自靜以動靜見天地則可謂動靜生天地則不可也因天有日月星辰則以少陽為星少陰為辰矣地有水火土石則以少陽為石少陰為土何所見耶然猶可也而以星為晝辰為夜者何也寒暑乆耳晝夜速耳何以辨其陰陽太少也雨露風雷陰陽之所化也何以屬之地而謂土為露石為雷也雷之發聲往往在水土中不聞在石也露至輕清最高在雲之上不聞在上也皇帝王霸以配春夏秋冬之升降可耳至配生長收藏抑何贅也謂三王收而五霸藏不知其所證引也夫子有曰聖人立象以盡意至設卦之後始繫辭以盡其言今以言配五帝以象配三王者何也且夫五霸之時以語冬則可五霸之術以語冬則不可冬之藏為春地也五霸之藏亦為三王地乎不得已而又以體用心跡交互焉抑何其割裂穿鑿也使此書在宋前其見排斥而揮之籓籬之外久矣書韓世忠傳後韓蘄王一健鬬將也而忠志材氣有古大臣風晚節優游物外以智藏身則庶幾留文成而尉遲鄂公所不論已吾嘗謂宋高宗即昏愚何以信姦檜至此即議和之不浹嵗而烏珠已敗盟矣然無纎芥之恨及檜者其畏諸將甚于畏金人也蘄王得其幾矣故亦能借而苟自全凢岳武穆之死所以成蘄王之生也蘄王生於是乎為宋臣者皆有生樂而鮮死憤矣書趙鼎傳後吾嘗取宋南渡以後之才而合晉南渡以後之才比之大約謂宋略不如晉止是緣飾儒術可觀耳緣飾儒術其可觀者在此其沒世不振亦在此又謂趙元鎮可比吾家始興然不如始興巧而善收採物情其和平練事足相當弱亦稱是後讀朱子語錄與吾評合李伯紀之忠志庶幾温太眞然愎而過自信又不能堅忍寜如太眞之權竒俶儻也張徳逺僅賢于庾元規元規亦非不忠于晉者但忮忍好殺且好勝耳其鋭而喜事所至無成亦略如之岳鵬舉喑嗚跳盪臨機决勝故在祖士雅上綏来鎮撫之略恐不如也韓良臣則又其下矣陳康伯不敢望謝安石虞允文采石之戰故自偉然亦乗敵之未渡而幸勝之又何可望康樂也陶士行未壊之桓元子元子已壊之士行然其材亦非宋所比晉之孽乃王處仲宋之孽乃秦檜韓伌胄史彌逺賈似道是以無解璽而有銜璧嗚呼豈不幸哉讀通書正蒙秦漢以後卓然欲紹孟子而追跡六經之後者揚雄氏而已耳王通氏而已耳周張二先生而已耳太𤣥紹易者也法言中說紹論語者也通書正蒙紹繫辭中庸者也其所入有深淺所造有純駁要之皆不能無意者也吾于措語之際竊窺焉二程者志在脩明夫子之道而羽翼之者也不欲為家是以其見不盡合既不盡合是以無取于正蒙而口不及通書其曰茂叔者不純師之也更百餘年而朱子特尊焉其尊之也亦以自為紹也曰通鑑綱目者紹春秋者也大約通書入之淺是以爾雅而鮮格辭正蒙入之深是以精至而多瑕語通書嫡也而不甚肖正蒙庶也且孽也雖然自秦漢以後未有能為是識者也其讀而不易入者何學既明矣是故二書為筌蹄而可以無述也譬之始制食芻豢者美之而謂為天下之食師也食之久味且忘矣而何有于師書趙松雪集後余嘗謂吳興趙文敏公孟頫風流才藝惟吾郡文待詔徴明可以當之而亦少有差次其同者詩文也書畫也又皆以薦辟起家趙詩小壯而俗文稍雅而弱其淺同也文皆暢利而乏深沉其離古同也書小楷趙不能去俗文不能去纎其精絶同也行押則趙於三王近而文不能近少遜也署書則文復少遜也八分古𨽻則文勝小篆則趙勝也然而篆不勝𨽻畫則趙之入唐宋人深而文少淺其天趣同也其鑒賞博考復同也位則趙至一品而文僅登一命夀則文踰九齡而趙僅垂七袠異也若出處大節之異前輩固已紛紛言之獨趙集有述太傅丞相巴延徳一章中所云輿地久已裂車書當㑹同又云六合仰照耀一方顧顓蒙嗚呼元誠而親主宋社誠屋巴延誠賢有功豈而所宜言者何有胷無心至此也吾待詔不與同年語也書耶律遼史後羊叔子世所謂仁人也然吾讀遼史以為耶律休格之鎭燕勝叔子逺叔子之鎭襄陽未嘗一日而忘取吳其所以勉而為仁者老子之所謂將欲取之必固與之也休格之部衆性貪而好殺以殺為仁以戰剋為徳而休格獨不然擁數十萬之衆席驟勝之威以壓宋而宋之諸將毋一能角材者顧獨曰保境息民而已使其下皆化之而不輕為擄掠嗚呼仁哉書廉希憲巴延諸傳後吾嘗謂元有三仁焉楚材輔剛主而柔之使不為暴于天下又能以死塞利孔其仁蔽天地矣巴延之下宋也肅而謐其居功也廉而約其處廢也恬而智其應世事也毅而裁古社稷臣哉乃廉希憲又有學力焉宰相之為眞宰相也男子之為真男子也噫孰謂元無人書改併五音篇後改併五音篇者金老儒韓孝彦允中病古集字之未精因改玉篇歸于五音逐三十六母之中取字而次子道昭復與其子徳恩猶子徳惠婿王徳珪増訂之加詳焉書成于金章宗之泰和八年而孝彦之猶子道昇序之者也其書未辨出道昭或徳恩徳惠手小楷法種種精妙吾不知于吳彩鸞僊跡何如南渡以後斷無有儷之者葢章宗時右文盛極而韓自書成之歳告殂其國日尋於干戈以至於亾無暇及典籍翰墨之事矣此書幸不逐燹化而吾又幸得之異日戒兒曹刻梓以從三倉凢將急就之後與廣韻韻㑹並傳寜不一大快事也書陶九成書艸莽私乘後陶宗儀九成於書鮮所不讀尤好纂集文獻掌故如輟耕錄說郛書史㑹要圖繪寳鑑之類雖雅鄭未分而璞玉良辨矣洪武初宋學士景濂序其書史已推為耆碩中間有纂修之召不就余嘗見其聽琴軒詩序及送行文或作古隷或作小楷葢至洪武末猶存而此所謂艸莽私乗者則皆忠臣孝子義夫節婦之事而元之末季諸公所撰著也其能完身名于革故鼎新之際晩節能以夀終殆非偶矣此書乃少年筆楷法尤精謹可存余既愛其人不忝乃祖靖節風而惜其湮没也特為拈出之書宋景濓集後一間與僧無心閲永明夀禪師日行百八事毋論精神疲于應接卽自子至亥盡廢食寢盥溲之晷而為之亦有所不能徧後又偶檢宋學士洪武以後集十二年中得文千四百篇永明神僧也固毋論已學士握文柄特自耳順而踰從心縱游刃斵輪不礙方寸亦寜無毫髮累而優然自如吾三載來五更起焚誦不過佛道經數巻應酬文字不盡却然亦不能學士五之一而日來心氣損耗成疾為子弟所苦禁亦自種種覺之乃知吳門白馬之喻誠非妄也因題數語於學士集後不勝貧子之歎書宋景濂集後二宋文憲以宿儒佐英主司禮樂制作之柄其高文大冊徧海内即近而九重逺而四夷亡能舎公筆弗請者骨尚肉而臺閣以易奪之久而至𢎞徳間縉紳以古奪之至嘉靖不盡程古亦不盡為易者復奪之葢至于今而不復有能舉文憲名矣何論著作雖然亦安可竟廢文憲也文憲於書無所不讀於文體裁無所不曉顧其槩以典實易宏麗以詳明易遒簡發之而欲意之必罄言之而欲人之必曉以故不能預執後人之權而時時見奪夫使後人率偏師而與之角孫主簿之三千騎足敵羸卒數萬若各悉其國之賦甲而競於大麓所謂五戰而秦不勝三趙再勝者邯鄲岌岌乎我故思用其人也書方正學文集後正學先生之死義天下之人能壯之而又能痛之當是時人主不勝一念之憤屠僇其宗戚以至朋友之屬無所不株累片紙隻字皆有厲禁然其文固已鳩于三十年之餘而大行于百年之後然後知萬乗之威不能與匹夫匹婦爭勝者此是也先生之學出于宋文憲不能如文憲之博而純則過之其文則不盡出文憲所自托在昌黎氏而不能脫蘇氏窠臼大較飛湍瀑流之勢多而煙波瀠洄之意少持論則甚正而㣲渉迂要非孔孟之書弗讀非濓洛關閩之學弗道而至一節之士如周孟橋楊云敞孔璋輩津津稱之不容口異日經濟之不盡究而以致命遂志終固其托寄樹立然也建文魚水之契于集中亦一二見之第齊黄日夜不遑寝息以成燕之禍禍成而委之先生以一木而支大厦之任良可歎也集中林嘉猷者先生門人建文中為按察僉事先生使之行燕世子間亦甚竒審爾則必不使先生草即位詔即不指斥亦必不免若乃至東市而哀憤伉厲固不特一先生也世之哀先生者或過有所褒飾然不失為志士而國史成于宣廟時似亦可以已矣而曰孝孺叩頭求哀命執之嗚呼彼寜叩頭者哉書李空同集後空同先生兩疏于𢎞治間擔荷世道不淺雖再下詔獄見以為煆煉而實益其剛果之氣若廣信之訟血氣與義氣各强半耳材高而病脱疎則易入名高而尚激厲則易染同舟遇風胡越相救而不知其伏機之至此也一遇康徳涵再遇林待用而後得免虎口噫嘻亦危矣當嘉靖之丁亥己丑間楊應寜當國名為最知先生而竟不一推轂事殊不可曉吾嘗謂憐才者若春風拂面便消忌才者若冰雪寒必透骨俯仰千古至今尚新可歎哉書李西涯古樂府後吾嚮者妄謂樂府發自性情規沿風雅大篇貴樸天然渾成小語雖巧勿離本色以故于李賓之擬古樂府病其太渉論議過爾抑剪以為十不得一自今觀之亦何可少夫其奇㫖創造名語疊出縱不可被之管絃自是天地間一種文字若使字字求諧于房中鐃吹之調取其聲語斷爛者而模倣之以為樂府在是毋亦西子之顰邯鄲之歩而已書陳白沙集後陳公甫先生詩不入法文不入體又皆不入題而其妙處有超乎法與體與題之外者予少年學為古文辭殊不能相契晚節始自㑹心偶然讀之或倦而躍然以醒不飲而陶然以甘不自知其所以然也若邵堯夫非不有㑹心處而沓拖䟤䟦種種可厭譬之剝茘枝薦江瑶以佐蒲萄之酒而餒魚敗肉梟羹蛙炙雜然而前進將掩鼻抉㗋嘔噦之不暇而暇辨其味乎然公甫乃極推重莊孔暘又堯夫下也而公甫亦自沾沾則不能盡出無意以此小讓陶先生書王文成集後一余十四嵗從大人所得王文成公集讀之而晝夜不釋巻至忘寢食其愛之出于三蘇之上稍長讀秦以下古文辭遂于王氏無所入不復顧其書而王氏實不可廢盖當王氏之為詩少年時亦求所謂工者而為才所使不能深造而衷于法晩節盡舉而歸之道而尚為少年意所累不能渾融而出于自然其文則少不必道而徃徃有精思晩不必法而匆匆無深味其自負若兩得而幾所謂兩墮者也以世眼觀之公甫固不如以法眼觀之伯安瞠乎後矣若伯安所上封奏陳事理敘功略捭闔宏暢使人目醒當不在蘇氏下余少嘗見魏子才先生曰伯安疏絶不如胡永清此以事理言也非以文也書王文成集後二王文成公之致良知與孟子之道性善皆于動處見本體不必究析其偏全而沈切痛快誦之使人躍然而自醒人皆可以為堯舜要不外此第孟子之所謂善足矣乃必盡闢他說以獨伸吾是文成之所謂良知足矣乃至盡引經語以證吾合吾伸吾是而彼之所謂是者亦出矣吾證吾合而諸牽蔓而不能悉合者亦出矣譬之行道而得康莊見者振足噉酪而得醍醐聞者朶頥何暇辨他岐别異味哉乃北人不學妬文成之俎豆而膚辭詆訶之眞蜉蝣之撼樹可笑也書李于鱗集後昔在西省東署時於于鱗詩無所不見而所見文獨贈予兩序及顔神城碑之類不能十餘首當時心服其能稱說古昔以牛耳歸之衆已有葵丘之議而最後集刻行則叛者羣起然徃徃以詰屈聱牙攻之則過矣于鱗之病在氣有窒而辭有蔓或借長語而演之使不可了或以古語而傳新事使不可識又或心所不許而漫應之不能伏匿其辭至于寂寥而不可諷味此三者誠有之若乃誌傳之類其合作處眞周鼎商彞尺牘之所輸寫奇辭澹言縱横溢來而莫能禦恐非北地信陽所辦也徐子言之惡于鱗著之書吾旣不伏亦不暇辨為志數語於後書歸熈甫文集後余成進士時歸熈甫則已大有公車間名而積數年不第毎罷試則主司相與咤恨以歸生不第何名為公車而同年朱檢討者佻人也數問余得歸生古文辭否余謝無有一日忽以一編擲余面曰是更不如崔信明水中物邪且謂何不令歸生見我當作李密視秦王時狀余戲答子遂能秦王邪即李宻未易才也退取讀之果熈甫文凡二十餘章多率略應酬語葢朱所見者杜徳機耳而又數年熈甫之客中表陸明謨忽貽書責數余以不能推轂熈甫不知其說所自余方盛年憍氣漫爾應之齒牙之鍔頗及呉下前輩中謂陸浚明差强人意熈甫小勝浚明然亦未滿語又數年而熈甫始第又數年而卒客有梓其集貽余者卒卒未及展為人持去旋徙處曇靖復得而讀之故是近代名手若論議書疏之類滔滔横流不竭而發源則泓淳朗著誌傳碑表昌黎十四永叔十六又最得昌黎割愛脫賺法唯銘辭小不及耳昌黎于碑誌極有力是兼東西京而時出之永叔雖佳故一家言耳而茅坤氏乃頗右永叔而左昌黎故當不識也他序記熈甫亦甚快所不足者起伏與結搆也起伏須婉而勁結搆須味而裁要必有千鈞之力而後可至于照應㸃綴絶不可少又貴琢之無痕此毋但熈甫當時極推重于鱗于鱗亦似有可憾者嗟乎熈甫與朱生皆不可作矣恨不使朱見之復能作秦王態否熈甫集中有一篇盛推宋人而目我輩為蜉蝣之撼不容口當是于陸生所見報書故無言不酬吾又何憾哉吾又何憾哉書洹詞後崔子鍾論人雖過刻然徃徃有識見不隨衆悲笑獨于文務翦裁而無沛然之氣蹊徑斧鑿靡所不有葢慕子雲之法言而工不足者也吾每讀歸熈甫時義厭其不可了若千尺線每讀崔子文句句可了若線斷珠落恨未有并州翦刀剪歸生以端午續命絲續崔氏也讀大學大學一書古聖帝王相傳體用之大要雜見于禮經而朱子獨表章之令天下家喻人習不若五經之有專治而不能相通也於戲亦盛矣吾獨惜朱子之勇于表章而不精于訂定也夫三綱領八條目盡之矣今雜置知止及物有本末諸條于首章以致知格物之解闕焉而妄以腐庸之長語補之不合聽訟之章於物有本末後又贅之以釋本末且遂有本末而無終始何舛也王文成之格物與朱子異且取大學之古本以正其誤似矣然所謂古本者恐亦未盡當也新民之釋章明徳前而止至善後昭昭若日星誰能廢之且欲以如保赤子之一言而證親民抑何闊迂也區區管窺竊以大學本無闕文位置稍失序耳前亦非聖經後亦非賢傳葢曽子引夫子之緒言而繹其意以誨門人門人因而成書前列三綱八條目而後序釋之凡古人之為文類如是耳何以知非曽子書也文有曽子曰云云不應自言而中自引之也所謂門人者必子思也何以知其子思也它門人必不能也今竊為之訂定曰大學之道在明明徳在親民在止於至善古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物物格而后知至知至而后意誠意誠而后心正心正而后身脩身脩而后家齊家齊而后國治國治而后天下平康誥曰克眀徳太甲曰顧諟天之明命帝典曰克明峻徳皆自明也湯之盤銘曰苟日新日日新又日新康誥曰作新民詩曰周雖舊邦其命維新是故君子無所不用其極詩云邦畿千里惟民所止詩云緡蠻黄鳥止于丘隅子曰於止知其所止可以人而不如鳥乎詩云穆穆文王於緝熈敬止為人君止于仁為人臣止于敬為人子止于孝為人父止于慈與國人交止于信詩云瞻彼淇澳菉竹猗猗有斐君子如切如磋如琢如磨瑟兮僴兮赫兮喧兮有斐君子終不可諠兮如切如磋者道學也如琢如磨者自脩也瑟兮僴兮者恂慄也赫兮喧兮者威儀也有斐君子終不可諠兮者道盛徳至善民之不能忘也詩云於戲前王不忘君子賢其賢而親其親小人樂其樂而利其利此以沒世不忘也知止而后有定定而后能静静而后能安安而后能慮慮而后能得物有本末事有終始知所先後則近道矣自天子以至於庶人壹是皆以脩身為本其本亂而末治者否矣其所厚者薄而其所薄者厚未之有也子曰聽訟吾猶人也必也使無訟乎無情者不得盡其辭大畏民志此謂知本此謂知之至也然則致知在格物之章何闕釋乎大抵所謂大人者徳位兼備之大人而所謂學者治國平天下之學故于格物一章遽及于無訟之為本以見體不離用平天下之章絶不及國而惟致辨于忠信驕泰之得失以見用不離體而中以脩身貫之見大本之所在而後可以言學王文成之訓格雖小牴牾而其所謂物則合矣即物窮理之支離何必待辨而明吾故曰曾子授之而亦子思述之者也讀中庸讀中庸而知孟子之為子思門人無疑也孟子之言性善委曲懇至然不過因率性之道而明天命之眞耳其他所稱堯舜性之湯武反之即誠明明誠生學安利之說耳第反之一字却似未穩恐人作荀卿解首章擬朱子解則戒愼不睹恐懼不聞與下愼獨功由淺而至深而王文成解則下文之所謂獨者即不睹不聞而所謂愼即戒謹恐懼也竊詳文義當以文成為當下文朱解喜恕哀樂謂之中即天命之性也發而皆中節謂之和即率性之道也文成解則愼獨以後脩道之教事也微犯致字義矣苐朱子解則天下有大本而無逹道矣至于致中和分天地位萬物育又分戒懼謹獨支離割强大失子思本意中和者體用也中庸者即已成之徳而表之曰無過不及而已曰平常而已注變和言庸者誤庸之一字禪者亦知之曰平常心是道君子無入而不自得幾于化矣而末引夫子失鵠反身之論所以異于莊周列禦寇也鬼神之為徳章直與易繫相表裏祭義不足盡之郊社之禮所以祀上帝也此語有深味而朱子以不言后土為省文似失之天以象地以形雖分而上下然各一物耳而所以主宰之者一上帝也冬至而祀南郊其神此上帝也夏至而祀北郊其神此上帝也所謂易有太極也故詩書聖賢之所稱述有上帝而已不言后土者非略之也釋之言曰帝釋天道之言曰玉帝亦此義也所謂閻羅王者主治人之盡而為鬼者非土也夫子稱治天下國家有九經孟子之所謂王道者子庶民之一經耳而何以能使齊梁之君幡然而從我也博學審問愼思明辨篤行五者不可缺只在之字上體認分曉耳朱子之格物於之字似未徹也王文成之格物知有之而欲廢此五者不可也故皆不知聖言之全子思説致中和位天地育萬物至誠如神處絶得易繫之精非孟子所可及衣錦尚絅章與首章戒謹恐懼以後相表裹而精詳懇至讀書後巻四

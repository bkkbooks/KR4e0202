body:
  text: 讀書後别集類五明提要臣等謹案讀書後八巻明王世貞撰世貞有四部稿别著録此書初止四巻為世貞四部稿及續稿所未載遂至散佚其姪士騏得殘本于賣餳者乃録而刋之名曰附集後呉江許恭又採四部稿中書後之文為一巻續稿中讀佛經之文為一巻讀道經之文為二巻併為八巻重刋之而陳繼儒為之序周亮工書影記世貞初不喜蘇文晚乃嗜之臨没之時牀頭尚有蘇文一部今觀是編往往與蘇軾辨難而其文反覆條暢亦皆類軾無復摹秦仿漢之習其跋李東陽樂府與歸有光集心平氣和亦與其生平持論不同世貞嘗為有光像贊曰風行水上渙為文章風定波息乞聖慈容令照舊致仕事臣向以南京鴻臚寺卿致仕萬厯拾玖年拾壹月内䝉起南京太僕寺少卿本年十二月内陞南京光禄寺卿臣奉有兩次恩命不敢不遵限到任已於萬厯二十年正月初九日到任除望闕叩頭謝恩外伏念臣受恩三朝再䝉起用皆仰荷我皇上至仁天覆器使羣材欲使草澤之中無一人不盡其用故以臣之愚猶在收録臣之感恩雖捐軀豈足以言報但臣見年七十二嵗已過古人致仕之期臣自㓜受父師之教頗知事君之義切有許身之愚山東之歸年纔四十有一尚堪展布浙西再起年止五十有四猶可驅策顧前歸則一十三年後出則南北奔馳虚度四載今在里又一十四年矣坐成衰老臣實不才揣躬委命臣實義當知止伏望聖明察臣愚悃勑下吏部容臣照舊致仕臣當以待盡餘年朝夕焚香上祝聖夀無疆下帥父老子弟肅政教善風俗以為太平萬嵗之報臣無任悚息待命之至讀書後原序讀書後者王元美先生晩年所撰四部稿續稿所未載也初刻續稿時其間多所放失偶有賣􅄳者束殘書置擔頭取視之則先生詩文數巻及讀書後在焉王冏伯得之驚喜刻曰附集藏于家海内學士大夫不能數數見也許仲謙曰此弇州生平極得意之作但恨繕寫多訛甚則有數行後先顛倒舛錯者一日得王閑仲校正善本仲謙喜躍請以孤行之人間而因拈前四部中讀書後附焉陳子曰先生批駁釋道兩藏尤竒瑋宏博此獨非書後類乎仲謙乃與予重加㕘訂共得若干巻而先生之碎璧殘璣收拾無遺矣初先生遭家諱後日與敬美次公讀書萬巻樓如所謂士衡住東頭士龍住西頭者已召起敭歴中外納鄖節逺近贄文徵文者無虗嵗賔客觴詠無虗晷猶時時手一編見之論著至于戢身靖廬誓掃筆研而翻閲兩藏經矻矻丹鉛之故也先生慧眼辨才與妙觀察智皆事事第一且栽培之以國憲家猷熏染之以交遊聞見積習之以新陳嵗月試取少年晚年讀書後互味之覺􅉨時跌宕縦横標新領異如織錦而問天孫食肉而問禁臠雖眩目爽口或出于偏師取勝者有之至是霜降水落鑑空衡平奏刀必中觚發矢必中的抓搔必中痛癢㫁案一新精彩萬變非筆隨人老葢識隨人老也先生嘗謂余詩文闗􅀈出一字如獄吏平反置一語如兵家律令推而至于讀書法亦然若書生輕於立論論議馳騁大放厥辭嘗有驟發之數十年前而慚悔于數十年後者即欲追取更竄一兩字迄不可得夫未能使自已解頤而乃欲使古人唯唯心服無是理也宋尤延之手録古書即子弟諸女亦令抄寫視中祕且過之而不皆傳濡須秦氏為金部員外郎奏請田宅文籍不許子孫分割而竟不知零落何所今先生論著大約如吕氏讀書記及鼂氏讀書志毎終篇標其大指以僃遺忘而先生精確過之其牙籖萬軸雖未必一一無恙而糟粕去神髓存則身後書籍之若存若亡奚足道哉閑仲為先生小阮校閲精確最得真傳仲謙太常次公孫壻也尤嫺於瑯琊王氏一家言謂四部若大海水而讀書後則又海中之貝闕珠宫也巻帙不苦浩繁而學者得未曽有即以此孤行人間足矣雲間陳繼儒仲醇序

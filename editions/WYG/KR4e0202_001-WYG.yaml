body:
  text: 讀書後巻一明王世貞撰讀莊子一余讀莊子而歎曰嗟乎世固未有尊老子如莊子者也夫尊孔子者莫若孟子而孟子之尊孔子不過曰孔子聖之時又曰吾所願則學孔子而已其談仁義辨王伯探性善推不忍往往發揮所自得之藴以成其書固未嘗舉孔子之文言而訓詁之也荘子之所撰著雖極而至於尊天而無懐葛天之治其究必宿於老子之謂無名無欲無為無言以至無始之㫖挫銳守雌和光同塵絶聖智以應天下之法致柔守中抱一含䘒食母有精有信虚極靜篤以保一身之要與他所掊擊失道失徳失仁失義之弊聖智之當絶棄展轉反覆亡所不援引或曲而暢之或旁而通之且詠言之嗟歎之必使老子之道高出於堯舜之上其遺言下視乎六經而後已嗟乎莊子之尊老子不亦至乎抑不特尊之而已也而且老子之忠臣夫忠臣者揚主之善而諱其短凡老子之所稱張與奪枉曲直騁堅用竒取大取小得志於天下之故稍近術而為人所窺者則已逆料宋儒之見攻而閟之彼且以為真閟之也而其辭之剽攘弔詭身先陷於不韙矣夫書不可以多著也多著而至於十餘萬言而其㫖不過數百言而已是以雜而不可竟複而使人厭書不可以有意作也以有意而作之是以誕而不可信狂而使人怒嗟乎何莊子之忠於老子而不自忠也讀莊子二太史公曰莊子蒙人也與梁惠王齊宣王同時其學無不窺然要其本歸於老氏其著書十餘萬言大抵率寓言作漁父盜蹠以詆訾孔子之徒以明老子之術蘇軾記其祠而謂為得老子之麤者莊子盖助老子特不可為法而引楚公子操箠之僕隸其主而出之以為愛公子而不知事公子之法凡荘子之言皆實予而文不予陽擠而隂助之其正言盖無幾至於訾詆孔子未嘗不微見其意其論天下道術自墨翟禽滑釐彭蒙慎到闗尹老聃之徒以至其身皆以為一家而孔子不與其尊之也至矣余謂太史公非識荘子之麤者軾乃識荘子之麤而巧為之蔽者也當老子之時見天下之俗日趣於薄以至詐力相矯思太古之朴一見焉而不可得謂仁義之名實啟之則不得不惡其名而歸咎於文武夫既歸咎於文武而追其自則謂堯舜之不能造極於無為而以有為啓之則不得不致歉於堯舜夫堯舜而至流於周之未若有如老子所云者不知聖人不能為俗能因俗而裁成之而已不然以老子之知之即無位而不使東周之郭十里之巷若畏壘而日就纖獪以有儀秦也莊子又後百年而生者也彼見夫仁義之日偽而詐力之日深且其身儳焉而苦禮樂之拘纍我謂孔子實言之而其門人實廣之且天下皆以為聖人彼又懼夫老子之教日不勝故於聖人之外立所謂至人以尊老子又往往寓之一巵語於孔子而必持老子之說以駕其表然又窺見孔子之真為聖而不可奪故間以一二格言寓之意若曰孔子之未見老子一格也其得見老子而受砭焉又一格也大意在尊老子而抑孔子既抑之而又收之使為老子徒彼夫語道術而不列孔子所謂鄒魯之儒非耶且何以見尊至軾所欲去讓王說劍漁父盜蹠四篇而以列禦寇之齊續於陽子西㳺而為一章則甚當雖然無救於所謂詆訾孔子也讀荘子三蘇氏之欲去讓王說劍盜蹠漁父四章而以列子前後之續也無所據特以盜蹠漁父之排孔子甚而欲去之夫内外雜篇何嘗不排孔子也其排婉而深不若盜蹠漁父之直而淺也然而吾於蘇氏取焉所以取者何以荘子之文得之也凡荘子之為文宏放馳逐縱而不可羈其辭髙妙而有深味然託名多怪詭而轉句或晦棘而難解其下字或奥僻而不可識今是四章獨讓王猶近之而太疑於正而是三章者故甚顯暢而膚淺其法類若禮經之所謂樂記儒行者意必荘子之徒托而為之者也韓愈作讀墨而謂子夏之後流而為荘亦無所據而王安石引之吾以為不必自子夏氏若荘子者盖嘗受業於孔子之門而有得者也何以知其然也凡荘子之所談如君臣父子之大戒天機嗜欲之深淺六經之用聖人之論議皆精切而爾雅即田子方荀卿之所不能及特不若其治老子之深盖游於吾聖教而中畔之者也太史公謂申韓之學出於老子故與之同傳唐人祖老子而離之吾以太史公信也夫所謂學不必其盡學也得一語而守之曰嗇曰儉曰國之利器不可以示人曰将欲取之必故與之此申韓氏之所貴也若荘子則無是也太史公又謂荘子梁惠王齊宣王時人審爾奈何不使與孟子見而一相究詰也荘子非告子夷之比也其鬬必若涿鹿彭城之戰天地為之蕩而不寧日月為之晦而不辨夫荘子敗則逃之無何有之鄉而已然而不怒也孟子不敗也敗則怒讀荘子讓王篇讓王一篇或以為漁父盜蹠說劍皆非荘先生所作而讀其辭則若差暢而近古於道亦不至悖第中所稱堯讓天下於許由許由不受又讓於子州支父而亦不受支父疑即巢父也舜讓天下於子州支伯而亦不受支伯疑支父子也夫是三君子者不以天下易吾生者也舜又讓天下於善巻而亦不受此不以吾身殉天下者也又讓天下於石戸之農而不受此以舜之徳為未至者也皆入深山蹈滄海而絶其跡者也湯克桀以讓卞隨卞隨沈椆水而死讓瞀光瞀光沈廬水而死則何言哉夫所貴於不為天下者為生也所以能近道者為削名也為名而自殘其身則不智居潔而顯揚其汙則不仁許由巢父事多傳之者或不妄其他或荘先生之寓言或他人璅言之而荘先生為記之要之不足道特惜夫莊先生之自持論而自相悖者也彼卞隨瞀光者巢許五君子之罪人也而又何言也讀列子吾始好列子文謂其與荘子同敘事而獨簡勁有力以爲差勝之于鱗亦以為然而柳子厚故謂列子辭尤質厚少譌作最後稍熟荘子始知列子之不如荘子逺甚凡列子之談理引喻皆明淺僅得其虚泊無為以幻破闕於膚膜之間而莊子則往往深入而探得其髓其出世處世之精妙有超於揣摩意見之表者至其措句琢字出鬼入神固非列子之所敢望也吾意列子非全文其文當缺而後有附會之者凡莊子之所引微散漫而列子之所引則簡勁疑附會之者因莊子之文而加劘琢者也柳柳州列子辨獨舉劉向所稱為鄭穆公時人以穆公在孔子前百餘嵗而厯舉列子在繻公時與其相駟子陽證其非夫列子引孔子不一而足是可知己又何必别引子陽以為證且向寧不自知其非鄭穆公穆之一字當由傳録者訛柳州之辨其所不必辨尤可笑也讀墨子墨子戰國一賢士大夫也孟子闢之以為惑世誣民若不可一日容於堯舜之世者而後世如韓昌黎輩尚尊之以與孔子竝稱而上嫓於神愚以為皆過也今讀其書大抵皆平治天下國家之道不甚悖於理如所謂入國必擇務而後從事國家昏亂則語之以尚賢尚同國家貧則語之節用節葬國家憙音湛湎則語之非樂非命國家淫僻無禮則語之尊天事鬼國家務奪侵凌則語之兼愛然則墨子之言以救世主之藥石耳非欲執而為世主之準也獨所謂棺三寸足以朽骨衣三領足以朽肉掘地之深下無菹漏哭往哭來及從事乎衣食若以為薄而無當者然此亦中産之下之常至今獨不能改而探墨子之㫖大槩激於一時王公大人之為葬埋謂必大棺中棺革闠三操璧玉即具戈劒鼎鼓壺濫文繡素練大鞅萬領輿馬女樂皆具必捶􅀈通壟輟民之事廢民之財如此而矯之以薄亦何不可且夫驪山之藏不三載而焚掘殆盡即漢唐宋以還諸陵寢亡不發者王公大臣貴家亡得完骨者厚葬之為失不唯損天下之有用以歸無用戕天下之有知以供無知其究至於暴其親之蛻以委草莽餧鳶犬而横開天下椎埋劫殺之竅其罪加於薄葬者何啻萬萬倍顧不之訾而徒墨子之訾何也且夫墨子之道行則世主必不能安宫室之侈與聲音采色狗馬田獵之奉卿大夫必不能安趙孟韓魏之富而說客游士必不能安華陽碣石之居與後車數十乗從者數百人其辭而闢之者葢不止一孟子也吾故曰微孟子墨子固不能久且大也然而所謂塞路者何也貧乏失職之徒假其說以干世主用之則貴且顯即不用而可以希冀賢豪富饒之匄施一廛一畝足以終其身而已此非墨子意也為墨子之徒而私之者意也讀尹文子尹文子非偽書其言刑名者真能言刑名家者也所謂智巧皆當與衆共之獨行之賢不足以成化獨能之事不足以周務出羣之辨不可為戶說絶衆之勇不可以征陣是以聖人任道以夷其險立法以理其差使賢愚不相棄能鄙不相遺能鄙不相遺則能鄙齊功賢愚不相棄則賢愚等慮此名語也他所証多諸家書頗覈而不倍道故存之讀孔叢子孔叢子吾夫子之世家乗也徵獻而文亦寓焉自子思以後世世為諸侯師然而不能為其國救敗辱焉無它諸侯者能以禮夫子之禮禮其後而不能以闕夫子之道用夫子之後之言故也子順所謀筴皆不悖於理而最後欲令魏隂媚嫪毐以圗苟全則大謬鮒之就陳涉也以復焚書坑儒讐也即死難何累哉獨敘世一章謂琳子黄厥徳不脩失侯爵大司徒光分所食邑三百戸請封黄弟茂為闗内侯茂子子國子國生子卬子卬生𢎞農守仲驩仲驩子立與劉歆友善歆故光同時人小可二十年耳是立與六世大父行友也立子元元子建仕王莽為建戎大尹亦似太速疑必有脫誤讀劉子劉晝孔昭所作五十五篇其詞雖骩骳爽健而不悖理道識是非有布帛菽粟之致清神防欲知情韜光諸篇苦李蒙荘之藩隠然若窺見者當六季之末而不堕月露煙華亦足貴矣鄙名以後小露學問無關本真兹則多生之餘習矣讀子華子子華子十巻自孔子遇諸剡而贈之以束帛於是著焉劉向序其辭以為趙簡子奉纁幣聘之爵執圭而殺竇鳴犢舜華子華子逡巡弗應簡子大怒将脅之以兵子華子去而之齊齊景公不能用也館於晏氏簡子卒而歸晉時已老矣遂不復仕以卒余得而讀之陽城胥渠章頗言陰陽之理亦有大致語而風輪水樞之說亦微近穿鑿其辨黄帝鼎成升遐事甚詳然似是公孫卿以後語駁郯子禮亦正然似是左氏以後語辭趙簡子聘章則摹檀左文也晏子之事景公也不治阿且其言阿則烹與封之說也謂仲尼天也又曰轍跡病矣則門弟子之說也大道章頗言身中之造化時時及養生北宫意章則及醫矣是岐黄之說也凡子華子所言理在春秋時最近而文則廣有所剽擬誦之可也采而益我可也然不可以為真子華子讀楚語論屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老将薦芰屈建命去之君子曰不違而道柳宗元非之曰禮有齋之日思其所樂思其所嗜子木去芰安得為道蘇子復非之曰甚矣柳子之陋也赫赫楚國若敖氏之賢聞於諸侯身為正卿死不在民而口腹是憂陋亦甚矣使子木行之國人誦之太史書之天下後世不知夫子之賢而唯陋是聞子木其忍為此乎余則曰甚矣屈建之忍也而蘇子之好異也今夫取禮之輕者與食之重者比奚啻食重然則禮而輕也當其身尚不以廢食而况於其親乎哉從治命不從亂命恒也屈到之命薦芰亂也否也且夫芰與蔬蔌等耳非若邕之痂長孺之爪甲腥穢而不可登席又非若銅雀之伎之淫侈也臨穴之殉之酷也宗老言之建頷之撤一蔬可以易益一豆不為多國人何所誦太史何所書而天下後世何所知乎今以建之卻之又不能為之諱而國人之媚新令尹者以為不違道而書之太史傳之天下後世是揚先人之過者建之卻也不在薦也夫不忍於一薦之小禮而棄忘其父之嗜好其不孝小也急於揚已之名而不諱其父之誤其不孝大也夫建也挾左右廣之甲而欲無禮於盟主之上卿棄諸侯之信而不之顧此夷狄也而何有於小禮也其父生不得志於鼎俎而又銜建之驁桀故示微於宗老而建卒弁髦之寧不違道也或云屈到之芰建可薦也建之不薦左氏可無稱也左氏之稱柳子可無非也柳子之非蘇子可無譏也蘇子之譏子可無衷也甚矣儒者之好持論也余無以對書趙世家公孫杵臼程嬰事後程嬰既已脫趙孤而謂公孫杵臼曰今一索之不得後必且復索之公孫杵臼曰立孤與死孰難程嬰曰死易立孤難杵臼曰趙氏先君遇子厚子强為其難者吾為易者請先死云云其後韓厥說景公與程嬰謀而劫諸将僇屠岸賈滅其族復與趙武田宅如故趙武既冠為成人程嬰乃自殺以報宣孟與公孫杵臼或曰嬰可以無死死過也予則以為不然凡嬰之所為存孤者誠難而杵臼死誠易然天下之所覩者生死也所不覩者難易也自趙孤之未立而嬰所以生者為趙孤也嬰故未嘗一日忘死也趙孤立而嬰生則食趙氏之報嬰能無死也杵臼死而以生授嬰嬰生而以死還杵臼夫豈直義至盡哉盖有餘仁矣雖然岸賈亦烏可非也盾以不能討賊失之終然其始事可亮也岸賈以不能匡雪失之始然其終事可取也盾既為法受惡而未有能表岸賈者也書伍子胥傳後伍子胥勇烈徇志丈夫也謂之盡孔子之道則不可謂之悖孔子之道亦不可孔子之事魯也幾微不合輒去之又曰父母之讐不共戴天不合而去有新君在矣不以事新君為二心也孟子之言君之視臣如草芥則臣視君如寇讐孟子過矣草芥其親寇讐之可也草芥其身寇讐之不可也平王淫太子之婦而欲廢太子推忮以僇其太子之傅而併及其兄即商受何啻焉受不僇文王不僇太公父也何以斬燼餘之頭而懸太白鞭屍非過也情也亦理也吳王僚信子胥之言謀伐楚而光阻之不以怨光而進專諸俾刺僚而奪之位盖審僚之不能得志於楚也光為之破楚以伸志故竭力而事之又為其子竭力而報越讐其必不赦越也欲以為奢者為光而夫差弗信也社将徙矣力諫而死之知亡智也能死忠也若子胥者於君臣父子之間可無媿也太史公稱吳以子胥謀西破彊楚北滅齊晉南服越人信哉獨所以彊吳之蹟備於吳越春秋而其辭不雅馴使子胥之志明而才不盡顯以此少泯泯耳或謂子胥之托子於鮑氏何居曰彼盖傷奢尚之綫絶而强延之以孝托也吾故曰子胥者不悖孔子之道者也書樂毅傳後樂毅之破齊凡五載而功不就至以讒間去天下惜之獨蘇子瞻謂當其時使昭王尚在反間不得行樂毅終亦必敗何者燕之併齊非秦楚三晉之利今以百萬之師攻兩城殘寇而數嵗不決師老於外此必有乗其虚者矣諸侯乗之於内齊擊之於外當此時雖太公穰苴不能無敗愚以為蘇子之論事勢審矣獨未能悉樂毅也夫樂毅者夏侯𤣥之所謂仁人也彼非獨仁人也而又且智彼其合諸侯而擊齊一戰而大破之臨淄下湣王走死齊之重器竒珤悉輸之燕中矣如是而不急攻莒即墨者以為二城彈丸之地不足為吾害莒南近楚急之則必借楚以為我敵即墨東近海死守虜耳急之則多殺士卒而未即破而齊故數百年大國也其人彊武而習兵且易以亂故必緩而用威徳拊循之既久而齊人皆為燕矣夫豈直為燕彼且以樂毅真吾主然則毅之兵固未嘗五載而盡頓於二城之下也以故新主立而南面之間得行騎劫代之勢不得不盡銳以攻即墨而又以新將故不識地利而恣為暴燕人失毅而離齊人失毅而振盖不待火牛出而燕之敗形成矣且諸侯之所以不窺燕者自有說夫以齊舉宋而伐之燕舉齊而不伐非獨妬齊而厚燕也謂湣王之不若昭王治也謂湣王之待諸侯倨而昭王之待諸侯恭也謂湣之舉宋而暴宋不若毅之舉齊而拊齊也且騎劫敗而諸侯猶偃然以此知蘇氏所論誤也不然使毅而有可訾則惠王必不悔而召之召之不歸而何以封其子髙帝異代主也毅之後何以無功而封孔明三代才也何以自比毅而人猶未之許也若蘇子者真所謂以成敗論者也書司馬穰苴孫武傳後司馬穰苴孫武天下之言兵者歸之穰苴兵法不可見所見獨孫子十三篇其精切事理吾以為太公不能過也而太史公獨稱穰苴兵法閎廓深逺雖三代征伐未能竟其義如其文若爾穰苴其尤勝邪然太史公於穰苴則僅詳其斬莊賈於孫武僅詳其斬愛姬而已以為用兵之道一賞罰盡之矣雖然以穰苴之善用兵而使燕晉之師得脫而罷去追擊之僅收所亡境内封地耳不能大有所摧敗也景公尊為大司馬而委之政其時亦可以有為何不脩桓公之業而廓大之卒見擯於髙國以死至於吳之彊伍員力耳柏舉之戰雖能乗勝入郢而班處其宫使秦師得用其救再合再敗而後歸又不能預防夫槩之為内孽安在其為武也太史公又稱其北威齊晉顯名諸侯恐亦附㑹之過當其時武必先死矣不然而檇李之敗績㑹稽之許成舍腹心之越而從事於石田之齊武胡為不諫救也太史公亦云能行之者未必能言能言之者未必能行葢頗見微指云穰苴之兵法大約威王使臏忌輩增飾之晏子春秋亦一及其拒景公宴遊事亦略可証書吕不韋黄歇傳後自古至今以術取富貴秉權勢者無如吕不韋之穢且卑然亦無有如不韋之巧者也凡不韋之所籌筴皆鑿空至難期而其應若響彼固自天幸亦其術有以攝之至於御倡而知其孕必取三月進之子楚又大期而始生政於理為難信毋亦不韋故為之說而泄之秦皇使知其為真父而長保富貴邪抑亦其客之感恩者故為是以詈秦皇而六國之亡人侈張其事欲使天下之人謂秦先六國而亡也不然不韋不敢言太后復不敢言而大期之子人烏從而知其非嬴出也黄歇之為姧大類不韋而行之於為相之後尤不義第其始之脫太子雖若釣竒然甚勇而忠史固稱其博學洽聞覩所上秦皇書不下韓非子以一富貴之􅀢而積慮處事若虺蜮然亡身滅家而不覺豈不可悲也哉春申君不當稱四公子賤謀貴疎間親與文信侯竝而稱可也書蔡澤傳後蔡澤以唐舉一言之激袖手而入秦乗應侯之自危出不窮之辯杜其口伏其意安然而據其相位若承蜩然智者以為蔡澤之用應侯然不知應侯之用蔡澤也夫穰侯者秦太后之懿戚而四十年之信臣也應侯以一亡命扼掔而奪之此非特乗穰侯之瑕其材必有以大勝之者夫應侯相而穰侯日見短則應侯之相日益固應侯之相日益固則穰侯終不振當應侯之為相也竊君以行威福専意以酬恩怨人主非不知之特欲伸其所大欲耳武安僇鄭安平叛王稽見法人主之大欲不盡酬而應侯且無以自解葢嘗彷皇而左右顧求其人以託稅駕之地而不可得既而微知有蔡澤者游學干諸侯小大甚衆而不遇其困甚矣澤之與應侯又非有相知之素也其曷鼻魋顔蹙齃膝攣非能長富貴者也與之語頗明消息盈縮之理而非有捭闔操縱取天下之深計者也夫困極則易為徳非知素則深見恩不能長富貴則無與謀傾人之計筴者明消息盈虛之理則必不忍蹈前轍無捭闔操縱之深計則必無以見其長而形吾短故幡然而薦之天下皆以應侯能用賢而應侯之過自是無以聞於昭王者蔡澤而稱邪昭王固賢應侯其不稱邪則益以賢應侯謂亡有能及之者自是而據金印擁髙貲而老死於東第無患矣彼荀卿之於黃歇韓非之於李斯一以師一以同學而材皆勝之固歇與斯之所畏而不欲用者也宜其困且纍死也讀黃石公黄石公素書六篇至為淺顯孔老荀卿之所雅言者豈别有不傳之秘以授子房而此則約其凡為可示人者哉不然當報讐大索之後跪而進履於圮橋與夜半不失約子房已思過半矣何用是素書為也書項羽傳後吾少時閱書至夜分而困欲寐輒取項羽傳誦之即灑然醒以為非羽不能發太史公筆非太史公無以寫羽生氣羽之罪其大者在弑義帝坑秦卒二十萬人僇降王子嬰耳其惡不待言然彼皆有以致之義帝亦了了者第不免儒而腐夫一牧羊子耳王於項梁之手見梁敗而不羽之恤遽奪其軍而又不使之入闗其救趙也又使之為次将而所聽令者羇旅庸奴之宋義彼其心固已怏怏於帝殺宋義而楚卒屬之矣刎王離破章邯而諸侯屬之矣破函關而秦屬之矣其目中固已無義帝矣猶貌而使人請命帝但委之於籍且猶不能免而曰如故約籍能無恨也夫豈獨恨也當疑其與沛公結而圗籍義帝擁空名於上欲以承平之君臣而御怏怏之悍霸倒授太阿之柄而觸其鋒能不立碎也雖然義帝者腐而不失其正者也新安之坑子嬰之僇盖天道也彼諸侯之卒積數世而其首皆納於秦庭凡在者皆秦卒之刃餘也又皆其子孫也幸羽一甘心焉孰不為之揮戈者子嬰之降自降沛公耳非降羽也六王之身有屠而死者有囚而死者有饑而死者夫負芻非羽故君而燕及梁非祖父邪誰能忍之故曰有天道也至楚漢之為訟則羽之負漢者一而漢之負楚者三羽之負漢不王闗中而王巴蜀而已當羽入關與沛公兄弟也又皆楚臣何必拒而不納其負一也鴻門之㑹不殺而封之巴蜀甫就國而兵東嚮其負二也然猶有可言者至太公甫脫烹俎盟血未乾而反戈尾其後其負三也羽自得罪義帝耳不得罪髙祖髙祖死何以見羽地下哉余故友宗臣每酒間大呼吾寧不成而為羽不能成而為髙祖且謂髙祖易與耳余笑曰若言髙祖易與則過髙祖遇羽而拙故思以拙勝之若固見其拙以為易與耳不然彼章邯黥布豈碌碌者何以取之若寄哉書蘇子范増論後蘇子之論范增甚竒而其為書生於事體則甚闇夫卿子冠軍何人也以一言之偶中而懐王拜之為上将軍其智勇未聞也章邯既破項梁而殺之楚人之膽奪矣移兵而渡河以大破趙人趙人之膽奪矣趙舉而秦彊夫以已破之楚膽而當方張之秦勢且皆半菽之飢腹而氷霜不完之指唯有解甲而逆潰耳義送子相齊葢欲以為遁穴而僥倖於目前之未戰乃佯為大言以壓項籍籍不殺宋義趙必下楚必潰楚之潰在呼吸之間而無他術可以解為籍計者何以不殺義也増於此時去籍則秦追僇亡楚之末將而族之必也籍勝則恨增以為宋義之黨而先去以為三軍之望族之亦必也即兩俱免族而當叛臣僨將之名為増計者何以去也夫増奇策士也豈惟不去而已當與籍謀而殺義不然何殺義之後事事日取增計而尊之為亞父也然則增不當去乎曰有坑秦卒二十萬人失仁失仁法不足以取天下一當諫也違義帝之約而王漢王楚失信失信法不足以取天下二當諫也弑義帝失義失義法不足以取天下三當諫也諫不從則去之去之而無忿懥之跡以完其身可耳若殺卿子冠軍何以去也讀陸子陸賈縱橫者流耳而所撰十二篇皆淺顯無甚俶儻之見而亦不詭於道或謂非賈書不然也使後人偽為之則必詭其理雄其辭而張皇其事矣賈固時時近儒者髙帝不讀書故驟而歎其雄博其意不在馬上治故徐而益有入焉彼其他所以拊尉佗和平勃皆正論也是故幸以富夀怡樂終而不為食其之烹蒯徹之闕也說固有道矣讀書後巻一

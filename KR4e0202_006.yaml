body:
  text: 讀書後巻六明王世貞撰讀圓覺經余讀圓覺經所稱四大各離今者妄身當在何處未嘗不怳然自失至云四縁假合妄有六根六根四大中外合成妄有縁氣于中積聚似有縁相假名為心則又未嘗不洒然悟也余自束髮而来所身受榮辱憂喜悲樂亡慮數十百矣日憧憧焉役余而受之若以為真境焉抑何謬盭失計邪不得已而強受之而假名之得已而不已而又強執之嗚呼余之暴余深矣不即不離無縛無脫此是吾人善證第一義我愛既絶萬境皆空不願作佛何况生天亦庶幾矣莊氏言至人入水不濡入火不熱嗚呼是奚啻水火哉讀壇經一壇經其聖人之言乎哉然而非聖人教也其教行天下遂無祖矣非無祖也夫人而能為祖也黃梅之徒葢千餘焉引而不發躍如也達磨之示㫖微矣子曰參乎吾道一以貫之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣夫悟解悟也解悟非悟也酥乳醍醐品列而人嘗之而味得也日攜醍醐而食人知味者寡矣讀壇經二阿難親從世尊且數十年受楞嚴時幾隳法身而不支數現聖光屈金色臂指示要理而不悟六祖一謁黄梅而卽覺其入可知也然至遷化現虚空變分骸二國抑何其通達靈妙邪夫子曰或生而知之或學而知之及其知之一也書僧倜禪師傳後一曰僧稠覽倜禪師傳密行妙解化匝元魏高齊之際一時龍象葢南嶽思天台顗所不及也第攷朝野紀聞全載二書則謂倜少作沙彌徃徃同輩獰酗角力輙以劣弱見侮祈于金剛神求庇一夕夢神現大身執杵逼令食筋盡一鉢覺而力驟發同列猶侮之因橫蹋殿壁行數百歩躍首至于梁者數四乃引重千鈞拳捷驍武動駭觀聽後遂證果入林慮山搆寺宇窮極壯麗齊文宣聞而怒欲僇之躬率數萬騎徃討倜領僧徒候于谷口帝怪問倜曰陛下欲加法貧道恐血汚伽藍故爾受僇帝大驚禮懴旣設饌畢謂倜曰聞師得力于金剛神欲一見可乎倜曰此人力耳當為陛下見少神力因勅諸梁木起相搏聲若霆震摧迸紛墜帝懼而止之遂聽倜度人造寺無得禁止今傳不載其食筋呪木事第云出家落髮識神厲勇及受十六持勝法節食鞭心九旬食米量至四斗又遇懐王西王屋山兩虎交鬬咆響震岩乃以錫杖中解各散而去齊文宣加害領徒預逆因而感悔此却符合又傳謂齊乾明元年四月十三日辰時絶無患惱端坐而終異香滿寺茶毗之際白鳥數百徘徊煙上悲鳴移晷二書所載則又云於幷州營幡子未成遘病臨命願為大力長者旣成此功後三十年隋文帝過幷州見此寺而渙然若記處分營造其寺遂成當時故謂文帝大力長者也尋傳所以不載者得非謂倜師業證四果位居五地豈得乞靈鳥芻現身國主習小乘業作有漏因邪然攷之文帝以魏大綂七年生生二十年而始為乾明元年今乃稱倜師後身則尤可笑因附記于後以補傳之闕且證别記之謬書南陽國師傳後司空于頔問紫玉大通禪師曰如何是黑風吹入羅刹鬼國師曰于頔客作漢問此事作麽生頔失色師曰這便是黑風吹入羅刹鬼國代宗在便殿指觀軍容使魚朝恩謂南陽國師曰朝恩亦解佛法朝恩進問曰何謂無明從何而起師曰衰相現前奴也解問佛法朝恩大怒師曰卽此是無明無明從此起二段極相類亦大俊快然禪和子徃徃用此伎倆乆之不直錢矣于司空原籍是羅刹鬼國人魚軍容落地便結無明種子一生於其間作活何煩問對也書知𤣥法師傳後佛祖綂紀謂知𤣥法師自成都謁僖宗優禮之賜號悟達尋歸九隴定中見菩薩摩頂説法言訖即隠俄見一珠入𤣥左股隆起痛甚上有鼂錯二字𤣥知夙業即右膝安臥而逝世言𤣥之前身漢州三學山知鉉法師臨終感病與𤣥正類及攷神僧傳知𤣥邂逅一僧患迦摩羅疾候視無倦至别僧曰子後有難可徃西蜀彭州茶隴山相尋二松為誌後𤣥居安國寺僖宗禮之賜沈香座忽膝生人面瘡睂目口齒俱僃以飲食餵之則開口吞啖因憶僧言入山尋訪二松之間佛寺儼然故僧出迓甚懽遂留止宿告以所苦曰無傷也山有泉旦灌之即愈及明至泉所方掬水際瘡忽人語曰未可也公不讀西漢書乎曰讀曰旣讀之寜不知袁盎殺鼂錯乎公即盎後身吾乃錯也累世求報於公而公十世為僧戒律精嚴不得其便今公受賜過奢名利心起故能害之而迦諾迦尊者以三昧法水洗我我去汝不為怨矣𤣥乃掬水洗之痛徹髓絶而復蘇遂愈回顧寺無覩矣𤣥因卓錫其地述水懴三巻尋二本所傳雖一知𤣥前身袁盎而其事無一同者第其為寃報則一耳豈盎陷錯雖深而它行尚可錯被寃雖慘而餘因為劣邪因識于後書佛祖綂紀後自景徳傳燈録出而續之者至合為五燈其綂則釋迦世尊而下為迦葉阿難陀中有馬鳴龍樹以至菩提逹磨為西天二十八祖逹磨來本土為初祖以至慧能為六祖而衣鉢絶矣六祖之後最顯者二宗曰南嶽讓青原思讓之下為馬祖道一而道一之後其著復五宗而此綂紀則宋僧法槃别立教宗以法華為經天台為綂止觀為門曰三諦所謂中諦者綂一切法眞諦者泯一切法俗諦者立一切法為此一祕之藏不顯葢三惑覆之于是立三觀以破三惑曰空觀者破見思惑證一切智成般若徳假觀者破塵沙惑證道種智成解脫徳中觀者破無明惑證一切種智成法身徳大抵其義竪于龍樹演于南嶽思而備于天台智者自逹磨西來之後一洗而空之直截簡易最為高明之士所傾信而此說漸屈法槃乃推南嶽思以繼龍樹推天台智者以繼南嶽而自提婆逹多以至般若多羅西天之所奕葉而徑略之乃至斥禪那于别傳引遼人焚壇經寳林傳以為快謂雖異途而不敢不贊者賢首藏師叛去而竊用其義者清涼觀師公為異同而自立已意者慈恩觀師又謂圭峰密私用其言而專以四禪八定次第之學何用兒戲以侮耆徳嗚呼天台非非綂也止觀非非門也醍醐酥酪皆乳也釵釧杯盂皆金也物尚無諍而我何諍為且夫之燕者懼南其首耳吾北首而或水或陸陸而或騎或歩即歲月之小異何患其不至哉近有一妄庸僧口尚乳臭目不識三昧而輙作披荆鉞以攻賢首皆法槃輩為之俑也故雖精博如李長者超絶如大慧杲而不敢以為我師以其有諍心也何况法槃又何况此妄庸僧一么麽也書佛祖綂載後元僧華亭智常作佛祖綂載其名與綂紀同而立例却異自七佛以至二十七祖中國六祖一花五葉為主而教典正傳淨行神足亾所不該又效涑水通鑑編年之法為之其用心亦勤矣第有不滿人意者釋迦旣為始祖且係教主即當詳其罔明兜率之緣與生時化導之跡不宜太略一誤也末世如觀音化身為寳誌僧伽彌勒為傅士契此文殊普賢為寒山拾得尚猶記之而此四大士親助世尊行化瑰偉奇絶舍利弗須菩提皆佛大弟子而曽不得與諸高僧竝記二誤也我佛未生之前編年何用至于三皇諸紀皆路史稗官之談怪誕不經又與佛典非合而備載之三誤也佛生之後震旦世次沿革志其一二以為年綱足矣而備載不切之政濫紀無渉之人四誤也志存伐異即猖狂甚口之辭必收事取黨同則鄙俚不經之語亦録一語有助則小人盡為君子一事相睽則賢者遽成不肖五誤也大槩所熟五燈㑹元而已而於全藏未為淹通挂漏不少六誤也僧雛際㑹恩禮貴富取眩俗目書之有味七誤也須大出子墨一畨作用去十之八益十之三然後可稱釋史不愧法門聊志于後以俟異時第二巻載太古諸君盤古天皇地皇人皇氏五紀太昊炎帝少昊顓頊帝嚳帝堯帝舜夏商諸代旣在七佛之後又非釋迦同時至于三皇以前語出稗官事多荒誕略之可也卽如太昊在位僅一百十年女媧在位一百四十年而共工大庭以下凡十五代而通一萬七千七百八十七年則人各得千餘年天子矣豈理哉少昊既云黄帝子而系黄帝復云十八代一千五百年顓頊既云黄帝孫少昊之從子而系少昊復云十代四百九十年帝嚳既云黄帝曽孫顓頊從子而系顓頊復云八代五百二十年帝堯既云黄帝𤣥孫帝嚳次子而系帝嚳復云九代二百五十八年何自相矛盾至此也第三巻世尊降生成佛事當詳而反畧其生也曰二月八日其出家也亦曰二月八日又曰十二月八日今天下俱以四月八日浴佛而以臘月八日治粥供佛及施僧則兩二月八日恐未確穆王乘八駿游西極孝王時外國進二尺虎四角犀宣王時史籀改大篆平王政出方伯秦始逐諸侯客東巡瑯邪刻石何預佛門事後放此老耼身長四尺六寸額凸眉麤反唇騫鼻髆尖胯耼耳髼頭諸醜狀誰見之復誰紀之葢道家者流妄稱其有八十二種好相擬于世尊故釋氏之徒從而加毁也史記云老子入河沙不知所終而於紀己卯年著其薨亦無證夫子獨詳而不敢有所訾者以夫子之徒方馭世故也始皇癸未沙門室利防十八人來自西域帝惡其異俗以付獄俄有金剛神碎獄門而出之此事殊誕妄不足信第四巻中郎将蔡愔博士王遵等西訪佛道至大月氐國遇迦葉摩騰竺法蘭二師而迎之歸恐非實録當是摩騰法蘭自來也釋道比較焚經事妄是時無道經且所稱大臣皆不合吾前已辨之第六巻支公養鷹復養馬大違佛戒且晉世高僧皆以老莊得儁聲于本教故自淺孫興公許𤣥度于佛有何關而傳之郗嘉賔為桓氏弱晉者也爾時諸僧雛不過得數百緡便相稱述耳第七巻肇公為姚興所殺不知何故諱之不諱師子慧可無懴𤣥高而諱肇何也第他傳所謂將頭迎白刃一似斬清風恐亦係傅㑹是不類肇公語第八巻謝靈運謀叛棄市於佛何關僧道不拜王者可也若不拜父母則唯世尊始得第九巻逹磨觀世音大士化身也而誌公亦稱大士化身同時顯化南北人用為疑是不必疑千百億身之二人耳范曄魏收以其能叙述釋氏而無貶辭不知曄之逆亂收之淫鄙去崔浩李徳裕何霄壤也第十巻載文中子事甚詳以其語有西方之聖故也第十一巻謂唐高祖受禪百官拜舞僧但山呼拱立鄂國公尉遲敬徳金吾衛將軍劉文靖奏曰僧未登聖俱是凡夫何乃高揖王矦帝令定優劣編入朝典按此時尉遲公方在宋金剛部下作賊文靖為内史令亦無為金吾衛將軍原州五石青質白文成字祕䜟女主武王代有天下於佛何與奘法師之穎朗善記其什公之儔乎而潔烈勝之於道稍不足者綺語耳第十二巻黄梅𢎞忍大師夙生事余于本傳辨之吕太后武瞾之淫亂而能𢎞佛法豈眞能知佛法者即權教所不棄豈止枉尋直尺得獐失兎而已阿闍世雖殺父不赦十二時中尚有善念如二雌者善念永絶必墮無間嵩嶽珪與嶽神論話信是雄爽然尚非極則語第十三巻法秀施袈裟廻向寺領玉簫進𤣥宗事旣詭誕而末復及淫䙝語殊乖本色元魯山雖不為僧服及作僧語而有僧行附紀之可也安禄山陷長安𤣥宗入蜀而守臣有與禄山偕反者其人曾為閬守有畵像在路次𤣥宗見之大怒以劒斬像首其人在陜西首無故忽墜正史稗史皆不載最為誕妄可笑大慧杲引之以證禪悟而智常復載之何也第十四巻觀軍容使魚朝恩于帝前謂慧忠曰朝恩亦解些子佛法即問忠何者是無明明從何而起忠曰佛法衰相今現帝曰何也忠曰奴也解問佛法豈非衰相現朝恩失色大怒忠曰即此是無明無明從此起其語與大通答于頔惡風吹入羅刹鬼國一機軸然于能心折而魚更起忿端于差勝耳魚與忠復有問對語太峻險且無大意味渠方威振人主恐忠未便作此劇折或其徒有粉飾耳第十五巻清涼國師澄觀代宗大厯元年戊申奉詔入内勅譯華嚴徳宗貞元十二年丙子命河東節度使李詵迎澄觀入京同罽賔三藏般若譯烏茶國所進華嚴葢再譯也十五年進號鎭國大師加天下大僧録至開成三年戊午始示寂俗臘百有二可謂宿徳矣清涼得法于南陽忠徑一山欽為人主所尊禮然不聞忠國師之推轂江西一石頭遷而清涼之推轂百丈大珠南泉西堂藥山歸宗故當别有意也第十六巻大顚折韓昌黎書係僧雛偽撰吾前已辨之柳子厚少年急功名不自檢猶無害晩途遠宦邑鬱侘傺至死而謂神以恐喝求祀望阿脩羅趣且不可得豈可以其作綺語贊僧媚佛而諄諄錄之也智常有論謂周武廢教時沙門犯顔抗爭殆數十人及唐高議沙汰而惠乘𤣥琬智實法材等皇皇論爭引義慷慨亦見法門有人大歴而後祖道既興吾門雄傑盡趣禪林至武宗議廢教而稍能持者僅知𤣥一人而已雖上意不可解大數不可逃而變故之際無一辭可紀亦吾徒失學之故也尋智常此語太麤生然亦未宜盡廢宋宣和世亦然自十七巻以後唐時宗門伎倆幾窮賴趙州臨濟别作提掇警䇿一畨五季而後法席愈盛作者林立第覺諸大徳徃徃自學問中融脫得來雖辨才無礙天藻秀發而能踏江西頂透曹谿髓上者吾未之多見也了元雖詩僧尚有蔥嶺氣息洪覺範則一削髮苦吟措大耳陳隋之際焚身有崖菩薩者其人甚竒事甚偉而此不之載政和帝既詘釋教于宣徳門觀燈為一龎眉行童指斥殆無可對隨而杜口雖炮烙刀碪雜下竟不得其一聲鐵圍山叢談夷堅志皆詳之而此亦不載張無垢九成居士中龍象也與妙喜若一人而今絶不之齒豈有所不足邪張無盡求臺諫要得呵佛罵祖與司馬二吕諸賢放對正是擬作無佛論時識見也後作護法論便與蔡元長别乃知佛力不可思議耳晩歳翛然事外未必無得吾嚮者疑之過是不見屠兒廣額邪又云朱仲晦少年不樂讀時文因憶一尊宿説禪直指本心昭昭靈靈一著十八歲請舉時從劉屏山屏山意其必留心舉業暨搜其篋只大慧語録一帙則是言也禪者諛大慧而借朱先生為重之言也朱先生生平無書不讀所坐正于鑽故紙無出頭處果爾豈所謂晩来未必了了者邪宇文虚中為宋使金至翰林承㫖乆之以忌者搆其欲結南客殺北人舉族燒死今云夀百八歳無疾跏趺援筆朗吟而徃豈實録也其詩所謂英名留付世人傳當是被戮時絶筆語耳於釋門何與所載李屏山鳴道集其掊擊閩洛時有得有失而序之者湛然居士移剌楚材也移剌即耶律遼姓之訛音吾嚮者甚嘉楚材之功而疑其用處有佛圖澄僧稠意今果然即将為釋子後身也劉元城曰孔佛之言相為終始孔言毋意毋必毋固毋我佛言無我無人無衆生無夀者其次第若出一人苐孔以三綱五常為道故色色空空之說微開其端又云所謂禪一字六經中亦有此理逹磨西来禪話大行佛法弊矣若渠不来佛法之滅乆矣某之南遷雖平日於吾儒及老先生出處得力然亦不可謂於此事不得力吾嘗謂元城在元祐黨最為傑然投荒萬里垂暮年而莭不挫膚色不少變怪其定力之所自今了不諱賢于諸賢多矣然坐此不得收理學籍噉孔廟㹠臠老先生者涑水公也涑水心行幾希閔子卜夏然于死生處恐不如元城了了帝師怕克巴史云巴爾斯濟蘓又曰巴特瑪皆誤也其制詞稱名巴喇宻特巴勒丹其文始全而賜號曰皇天之下一人之上闡教宣文輔治大聖至徳普覺真智祐國如意大寳法王西天佛子大元帝師葢自有釋氏以來其光顯尊重未有過焉者也心印不如達磨神足不如圖澄開敏不如羅什記憶不如一行不過小持法呪唄而已而猥被世祖之寵秉中外釋教之權不亦幸哉書𢎞明二集後𢎞明集者梁釋彦悰述廣𢎞明集者唐釋道宣述也大要與黄冠諍角以掊擊拒閈為功姑取其衛教而已而不計其辭之憤與夸也悰公所述多東晉宋齊人語既不能暢其筆札而於所覽西竺文言亦淺鮮口若吐而吃指若舒而掣者葢理為辭窒辭為理困攻固非輸守亦非墨如是而已若宣公述則緇衣諸賢承梁武𢎞法之後其書盡出而脩辭亦漸暢第姗詈誕慢不特彼教之所不堪承而我古先生亦為之噦嘔矣其佳者不能勝陳琳之檄張湯之案而拙者則一村社閧訐耳彼黄冠又其下者無一息猶龍公派何足與辨也尋宣此述與續髙僧傳可謂篤信好學不可謂之知道也其志于釋門立功名其事則史其文則藻於吾儒葢鄭康成范甯之倫不可與望濓洛闗閩也余因妄有所評若逹磨而下諸祖其造類孟子智顗類朱子而皆勝之永明夀業可與朱子埒而大勝之大慧杲性質類程叔子學類陸子靜而微有低昂此語出兩家故當皆不喜然自有識者讀書後巻六

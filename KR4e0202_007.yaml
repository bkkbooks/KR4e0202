body:
  text: 讀書後卷七明王世貞撰書黃庭內景經後黃庭內景經者乃太上道君於蕊珠宫作七言咏歌以發修身繕性之要生人一身歸宿皆在泥丸而作用皆在心三庭三田之內有餘地焉真人在已莫問鄰一語若預知後之有取於西鄰者為拈破之即飛升度世資之有餘裕矣此經自景林王真人傳之南嶽魏夫人凡仙經四十餘卷而此為首南真遷化後幾三十年而後傳之東華楊司命而此復為首司命以後𨽻傳護軍長史許思玄少子上計掾道翔道翔之子黃民避亂入剡併諸經寄東闡馬朗家晉安守孔默罷郡還聞而以重幣勤禮懇之黃民而始得傳寫孔不及奉誦而其子熙先綜先才而狂謂經語誦之萬遍即得仙以為妖妄備酒悉取燔之後誘其舅范詹事曄反族滅而繕寫人王興私各録一本自隨渡錢塘漂沒僅內景存乃深信萬遍之説甫誦而火燬其廬再誦之露臺而雨漬其帙遂氣結貿厯日死深山中而經卷之在二氏者絶矣王靈期造黃民而懇得之輒加損益傅以麗藻遂盛行於世而黃民歸錢塘乃留真經一厨付馬朗後荏苒不復能取而卒馬氏寶奉之其人皆壽考大富三世移事佛而經稍散佚其後正本録本雜寓於陸靜修孔璪杜京産顧歡鍾法師婁居士諸公所陶隱居百方購得之陶有神鑒獨能辨楊君及二許真迹而內外景悉備閟之茅山今道藏所存本是也此與右軍固無與不知何緣宋思陵有臨本考之宣和書譜不載恐所得右軍內景經亦贋本耳載考此經一名太上琴心文一名太上金書一名東華玉篇孔熙先兄弟以為讀萬遍輒得仙而笑之不知授者非凡師乃仙師也受者非凡骨乃仙骨而又慈惠忠信耽注玄真者也受而齋九日用玄雲之錦九十尺金闕鳳文之羅四十尺金紐九雙以謝師沐浴居僻室九十日而誦萬遍一日當得百十餘遍亦不易易也今此經托之梓遍天下而耳目之授者何師而受者何人也即十萬遍奚益矣余自承本師曇陽子誨時時默諷亦已成誦文仲子休承許為余作小楷奉持之一月而休承目眵手戰不能終諾乃改以乞周公瑕公瑕日受役碑板間乃能舍而為余結此段方外緣亦佳事也書道德經後周公瑕往年為余書老子道德經五千言亡何而失之嵗庚辰公瑕歸自谼中念且老從我索一傳客或謂公瑕迫得傳而余恨失經以從臾公瑕續書之昔人所謂煥若神明頓還舊觀者殆不偶哉既裝成帙而志其後按太史公傳老子謂楚苦縣厲鄉曲仁里人也姓李氏名某字伯陽周守藏室史也居周之衰乃遂去至關關令尹喜曰子將隱矣強為我著書於是老子乃著書上下篇言道德之意五千言而去莫知其所終又云老子百六十餘嵗或言二百餘嵗以其修道養壽也又云老子之子名宗宗為魏將封於段干宗之後假仕於漢孝文帝而假之子解為膠西王太傅其本末甚明然自太史公言道家使人精神專一動合無形贍足萬物儒者博而寡要勞而寡功道家宗老子而儒者宗吾孔子孔子之教蓋萬世人王取則焉而其徒不明兩家之始所合遂抑絀老子以為異端而老子之徒其庸鄙詭誕者覩西來之迹宏竒高大炫耀一世遂不暇與吾儒辨而更竊漬其餘瀋以求與之角而並傳蓋豔釋迦之稱纍劫則謂在伏羲為鬱華子在祝融為廣夀子在神農為大成子在軒轅為廣成子在少昊為隨應子在顓頊為赤精子在帝嚳為録圖子在堯為務成子在舜為尹夀子在禹為真行子在湯為錫則子在周始為老子夫軒轅之世廣成居崆洞千七百年而其後猶未已也逺者姑亡論已前是而為廣夀為大成後是而為隨應為赤精又何人耶且堯舜禹非異代也一時而為三子何遷逝之速也三代以還賢公卿非乏紀也又何為而不一及也乃至謂老子生於商為周文王守藏史曰燮邑子武王時遷柱下史成王時守故官為經成子遂西遊流沙康王時復歸曰郭叔子昭王時復西邁云云蓋又傅會化人經之説也奇釋迦之有三十二相及七十二好相則亦曰七十二相八十好相也偉釋迦之長丈六尺則亦曰丈二尺也不知孔子九尺六寸人以為長人而異之若丈二尺而人不怪且駭者未之有也且史何以不載也夫老子至聖也其化而為太上靈真至尊也又奚必借西方之事而矯飾之然至儒者之所抑絀而指為異端者又可笑也老子往往皆格言其體至虛而不無其用至大而能泯其迹精以治躬粗以治天下取之固逢原矣大道廢有仁義知慧出有大偽六親不和有孝慈國家昏亂有忠臣知言哉君子之於世甚無樂乎其名也仁義也孝慈也忠臣也其名不得已而有之故曰絶仁棄義民復孝慈絶者絶其名復者復其實也將欲吸之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之謂倚伏貞勝造物若誘人而使之盈蓋使理國繕身者於張強興與之際悚然而思警也非以導人巧也夫不得老子之所以立言不解其文義而妄為之闢荀卿氏所謂賤儒也世貞一言而當獲譴於今之為二家者然使吾老子孔子而在以為譴哉不以為譴哉書莊子要語後莊子亦人中天也其位業所受則天中人也其言有倐然而出世外者則亦人中天也出而不能盡不獲如大雄氏者則又天中人也為言幾數十萬今吾采之而周生為録之者十不能一耳然皆粹乎瑩然若榖之得鑿酥乳之得醍酪而砂礦之得燭銀也自莊子之言出而後世之修辭者獵其竒務識者資其博拘方者疑其誕而守經者病其詭彼皆有以來之雖然彼固有以來之於彼無與也吾采之吾以自為而已於四者亦無與也書關尹子要語後昔關尹子望紫氣一縷於函谷之東而知猶龍公之至今不佞讀關尹子一句而知其非關尹子書雖然是後世識玄理曉養生苦思振竒者之所撰其言非以托關尹子也何以故能識玄理曉養生苦思振竒者必不以關尹子重以關尹子重者其人必剽黃老莊列之巵緒而為之屈於旨伸於辭恆也今此所屈者辭也所伸者旨也故曰非以托關尹子也乃王生為余書者則竒已甚矣思愈苦矣夫亦可以已矣夫書天隱子後天隱子一書司馬子微述謂傳之天隱子疑即子微所自著也注參同者見以為淺近思悟真者見以為局小而亦自有理至謂胞胎有形已呼吸精血豈可去食而求長生則所謂見其一未見其二者子微之術不過却病延年而已夫道苟不得病何必卻而年又何必延也其謂坐忘者因存想而得因存想而忘語故精書化書後化書者觀化也凡自有而忽無自無而忽有皆化也其自有而漸無自無而漸有者亦化也以我推物以物推物物以物物推天地皆自有無之際得之而葆身理天下之道寓焉其旨逺其辭文其言約而中是故識者曰此非齊丘之所著而真人談峭景升之所著也景升書成而授齊丘使行之齊丘匿而以已名焉或曰齊丘既得書忌景升而殺之或曰醉而以皮囊之沈之水為道家者曰景升羽化者也齊丘不得而殺也宋人之傳竒至云有魚而得一皮囊藻荇封之若馱鳥卵啓而得一人齁齁熟眠醒而問漁者曰化書行乎曰行矣吾在此甚樂幸復為我縫而置諸水此傅會也夫漁者何以知化書之行夫漁者得人而復置之水寧有是理哉是書也吾以為齊丘必竄入其自著十之一二而後掩為己有如五常一章忽云運帝王之籌策代天地之權衡則仲尼其人是也彼蓋所以名齊丘意也若景升必不推仲尼亦不必附於儒者又齊丘於觀化之際輒自稱小人所謂不考而招者一笑一笑書元始上真衆仙記後此記别標為葛洪枕中書而序辭稱於羅浮山夜半靜齋忽降一真人授書謂二儀末分溟涬鴻濛狀若雞子有盤古真人自稱元始天王遊於其中凡六劫而忽生太元玉女相與通氣結精還居玉京山宫殿凡一劫而一施太元母生天皇十三頭治三萬六千嵗其後天皇生地皇地皇生人皇太元母又生扶桑大帝東王公號元陽父九光玄女號太真西王母太上真人元始天王弟子也金闕老子太上弟子也其職如世之有司徒丞相耳它靈真銜名往往與位業圖相出入至所稱張衡楊雲為北方鬼帝治羅浮山嵇康為中央鬼帝治抱犢山伯夷叔齊為九天僕射周公旦為北帝師屈原為海伯王弼為北海監皆真誥所不載却又有大可笑者洪化去在晉惠中而許映許穆許玉斧郭景純皆生南渡以後與洪不相及又云二許為真人未有掌領又似未見真誥全文者夫好夸飾而不核古以是作偽書久而始逗露一何幸也道藏若此類多不可盡摘摘其尤著者書許真君石函記後石函記上下卷按此函既為許真君所載而中所搆撰皆不類晉人語蓋自張紫陽而後陳泥丸白紫清繼之俱以無礙之辨才發性命之宗旨一時門弟子模倣為之末宗骫髀之氣可掬乃至所為醉思仙歌亦托之真君大還丹歌則托之吳猛鉛汞歌托之嚴君平龍虎歌托之隂長生破迷正道還丹歌托之鍾離雲房敲爻􅘸頭壞贈别方處士題王先生菴門贈喬二郎鄂渚二道谷神直指大丹諸歌托之呂洞賔還丹破迷至真三歌托之劉海蟾鄙俚冗沓不能脫沿街鼓簡氣如出一口不知長生之四言何其古雅得正始之音而海蟾五言古風鍾呂近體清逸秀徑何嘗不渢渢唐氏本色耶此必陳上陽之流為之飾畫無鹽唐突西子良可恨也若其中有一二精至語不妨作摩天偈例取之書坐忘論後楊用修謂司馬子微坐忘論為坐馳誤也殆見其名未熟其語耳子微所謂執心住空還是有所既不合理又反成病若心起皆滅不簡是非則永斷覺知入於盲空若任心所起一無所制則與凡夫元來不别若唯斷善惡心無指歸肆意浮遊待自定者徒自誤耳若遍行諸事言心無所染者於言甚善於行極非此皆從方寸中煆鍊一番過來故於受病處極懇至乃爾其治心之法則曰息亂而不滅照守靜而不著空行之有常自得真見又云疑則任思悟已則已必其有思思則以智害恬為末傷本若煩邪亂想隨覺則除毁譽善惡皆即撥去莫將心受心不受外名曰虗心心不逐外名曰安心心安而虛道自來居如此下語即吾夫子之毋意毋必毋固毋我何以異也去曹溪黃蘖亦自不逺以此言忘何云坐馳吾故曰用修似未熟其語也書三茅真君傳後關中王令賜紱自白光祿啓常所來携光祿手刻三茅真君仙傳伏讀之即真仙通鑑所傳而頗加詳者也真君化迹顯在名山紀之真誥與南真石函並炳烺耳目夫復何疑所恨玄門操觚之士不通史學猥加藻飾以召瑕攻竟成蛇足耳不佞請得而略言之夫所謂百十二字寶號者受之天乎受之人乎受之天不過真誥所稱而已受之人不過唐宋以後所封而已不應煩雜至此且襲北極文昌之庀漏也秦時封徹侯至少不過蜀應文信及始皇時王賁王離趙亥趙成馮毋擇而已以李斯為丞相尚不得侯而何以有長平侯偃廣信侯熹也戰國有號無諡始皇不立諡何以又有長平恭侯也定録仲君以景帝戊戌生至武帝元朔元年舉賢良拜五官中郎將按元年為癸丑仲君僅十五耳是嵗雖下郡國舉孝廉不聞舉賢良也西漢官無所謂五官中郎其以上書拜郎中者主父偃三人耳不聞拜中郎也征和二年轉太子太傅按是嵗為癸丑戾太子反若在前則與少傅石德及宫臣皆從誅在後則不立太子設太傅也元鳳元年拜破胡校尉武威太守是嵗為辛丑時不設破胡校尉官保命季君以庚子生武帝建元三年舉方正不就按是嵗為癸卯君僅四嵗耳又云遊梁國為孝王上賔時孝王薨十餘年矣宣帝地節二年自洛陽令轉西城校尉是嵗為甲寅君年已七十五然是時亦無西城校尉官也元帝即位仲君拜執金吾季君拜五更大夫轉西河太守按是嵗為初元元年癸酉仲君年九十五季君亦九十三不應上之官籍今九卿二千石有此夀俊人主必當旌異史必為立傳亦不應寂寂乃爾且九卿年表執金吾為馮奉世無所謂仲君也亦不設五更大夫官大抵事玄者不當以其飾而恣為談守儒者不必惡其飾而遂生謗取理而節可也長夏無事偶書於後以示王令倘可遺光祿小刪之何如書桓真人升仙記後吾於丁卯秋中避迹𢎞法寺抽道藏翔字函小帙曰桓真人升仙記吾甚愛之因手書一通蓋謂記內所稱西蜀華蓋山李桓仙君授覬金丹大藥與飛步隱身諸訣既成而誨之俾從陶隱居為門弟子披髮跣足執鋤為圃十二年吾當舉之上帝詔升雲天且謂陶有三是有四非所四非者其一注藥餌方書殺禽魚蟲獸救治病其二好算星度窮究天機潛厭鬼神言人休咎其三種植花木耕鋤山林伐木匠屋自恃聲勢親近朝廷其四望想太重便希升仙創待仙樓造降真館又謂陶雕琢文詞勞神典籍窮究經旨好述異事且求真不一潛神二門言菩提行修西天記作往生文道釋並修則上帝未見用也凱如言而往果如期上升四非之説故余所甚契及後稍暇讀其全文而鄙之以其沓拖猥雜殊無六朝風氣而遍考諸藏有髙道傳云桓法闓字法舒不知何許人事隱居華陽館十餘年一日有二青童白鶴自空而下隱居欣然謂已當之童曰太上所命桓先生也隱居計門人無桓姓推執役者得法闓詰之曰常行默朝之道親朝上帝已九年矣隱居更欲師之法闓辭不許乃懇曰某於求道勤矣而尚淹世者非有過耶幸為訪之法闓駕白鶴而升三日密降隱居室謂先生隂功著矣而所修本草以虻蟲水蛭之類為藥利在人害在物以此小淹一紀乃解形當投蓬萊都水監此傳乃道士賈善翔撰進成都李汝成駁之以隱居玄門董狐豈有異人居門下而不識者又得隱居墨迹南平王所造清隱館即弟子桓法闓所居邵陵王又有隱居化後法闓猶存無先期上升之説而法闓受法髙弟其非執役固明甚也據賈髙撰傳謂都水監之説為門弟子女真錢所預告者又考隱居所著冥通記則周太玄從定録趙丞得之南真夫人者都不言法闓也若此上升記絶似唐末宋初人所作其前載李桓命法闓師隱居語尤誕妄且是時隱居尚存何得稱貞白先生蓋不知貞白為化後所賜諡也造偽書者賴有逗漏不爾令人頭眩讀書後卷七

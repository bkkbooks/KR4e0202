body:
  text: 讀書後卷二明王世貞撰讀淮南子史稱淮南子撰內書二十一篇外書甚衆又有中篇八卷言神仙黃白之術亦二十餘萬言今其存者內篇而已而又亡其三篇讀之知其非一手一事也其理出於文子莊子列子其辭出於吕氏春秋玉杯繁露慎子鄧析山海圗經爾雅其人則左吳蘇飛李尚田雷被伍被之徒各取其長而未及衷以故多錯綜重復不受整束而淮南王之材甚髙其筆甚徑是以能成一家言蓋自先秦以後之文未有過淮南子者也其書為劉向所纂集中篇之亡當亦自劉向為更生時故當得其枕中之鴻寶而作黃金不成幾陷大辟父得惡諡是以諱而去之夫淮南王好神仙身坐死而遺禍及更生亦幸而存哉或曰淮南王真仙去不死者也漢以法誅王求王不得而諱之讀賈子賈子上下二篇其上篇皆誦説時務其事與辭皆載治安䇿中不知其書成自擇而上之邪抑以其書上之而為班固之所裁節邪下篇則兼論德政援據古昔然論政則有餘論德則弗足矣人言文帝不能用賈生者妄言賈生不能用文帝者亦妄梁大國也懷王上愛子也以賈生居之蓋非久而入為公卿矣生死而文帝次第行其言孰謂賈生不用哉夫賈生用而不相陸贄相而不用則其君有昏哲也書齊悼惠王世家後一齊悼惠王肥者髙祖之庶長子也哀王襄者悼惠王之元嫡也文帝者髙祖之第四庶子也惠帝崩有二子皆疑當廢哀王立而考惠帝於事正於序宜吕氏殁諸吕謀危漢哀王發兵入討之為外主而諸弟朱虛侯章為內主奪産祿之魄而誅之功最大兵發而僇召平詐取琅琊下濟南才至髙諸大臣絳灌曲逆畏哀王之武而貪文帝之仁弱舍此而立彼僅還所奪之郡一侯其舅駟鈞以小慰觖望而已哀王以是嵗薨而文帝至為令主比德三代傳世二十寧非天哉二年王章王興居然皆背割梁趙盟皆析齊之壤而封之以失職怏怏章死而興居叛誅十二年志在王濟北十六年辟光王濟南賢王災川邙王膠西雄梁王膠東皆悼惠子也吳楚反其不從反者僅一齊地而已雖王之尚未愜於志也絳侯下獄駟鈞享國薄昭誅死外家之説胡據哉書齊悼惠王世家後二吾嘗謂髙帝有材子孫四人文帝亡論矣如意少而當帝心以為類我不幸夭耳必有以類髙帝者哀王襄景王章皆椒宫少年子也不畏髙后之餘威不虞諸吕之強力哀王鳩東海之烏合突起而西向章以北軍千餘之卒逐吕産而殺之悉殲其族黨非有膽勇謀斷誰能勝焉絳侯之與諸大臣共議謂駟鈞虎而冠恐以外家握權而亂天下而置之非本心也其意實患哀王之果鋭且其舉兵時名以誅諸吕則必以薄諸吕之共事者慮他日之見誅而貪代王之仁弱建䇿立之夫舍有功之齊而推不意之代王王必德我嗟乎庸詎知絳侯廷尉之獄不在哀王而在文帝駟鈞老於徹侯而薄昭以暴橫戮也抑不特此博陸侯光之立昌邑王有廣陵在也不聞昌邑之賢於廣陵光固難廣陵而易昌邑也昌邑廢而拔宣帝於民間而帝之天下之德光孰有過於宣帝者然而族光者宣帝也徐羡之等之廢廢帝也而先以法除義真為義真言敏鋭故預廢焉以為文帝地不知誅羡之等者又文帝也勃之辱光之族羡之等之誅雖必不盡出於公然而是諸臣者所樹皆得人以成一代之治所以報之者亦少恩哉書賈誼傳及蘇軾所著論後余少讀蘇軾所為賈誼論謂非漢文不能用賈生乃賈生之不能用漢文耳而中有云絳侯親握天子璽而授之文帝灌嬰連兵數十萬以決劉吕之雌雄又皆髙帝之舊此其君臣相得之分豈特父子骨肉手足哉賈生洛陽之少年欲使其一朝之間盡棄其舊而謀其新亦已難矣為賈生者上得其君下得其大臣如絳灌之屬優遊浸漬而深交之使天子不疑大臣不忌然後舉天下而惟吾之所欲為不過十年可以得志安有立談之間而遽為人痛哭哉觀其過湘為賦以弔屈原悲鬱憤悶躍然有逺舉之志其後卒以自傷哭泣至於夭絶是亦不善處窮者夫謀之一不見用安知終不獲用也不知默默以待其變而自殘至此吾未嘗不伏蘇氏論人之當揆事之長而歎賈生之無辭以自解其後得班史之所著傳而讀之然後知蘇氏之工於揆事急於持論而不盡悉故實也夫賈生之始建議改正朔易服色制官名興禮樂固非絳灌之所喜而實亦非絳灌所深惡也其所深惡者在遣功臣列侯就國而已故假以紛更之罪而譖之帝帝亦因其譖而姑出誼以慰安之且欲老其材而後用之耳非果於棄誼也何以知其然也諸王太傅在王相下與郡守等自大中大夫而出不為左遷特以長沙卑濕且一異姓貧弱之王其迹似棄耳亡何而召見宣室自以為弗如而徙傅梁梁大國也梁王愛子也誼不死即入而九卿矣故曰帝非果於棄誼也誼亦非悲鬱侘傺而至死者何以知其然也弔屈之辭雖若以自擬而實譏其不能自引而髙逝賦鵩之辭雖若以自弔而實歸之知命而不憂其所上治安䇿有可為痛哭長太息者蓋在召對宣室與傅梁之後也所謂立談之間而遽為人痛哭者豈實録哉且賈生之自傷在為傅無狀且哭泣以悲梁王之墮馬而死非以不用也夀夭有命生之夭又焉知其非命之盡而歸之自傷又歸之不用寧非寃哉史既稱絳灌之惡之而絳侯之就國以一言告訐而逮繫誼以待大臣之禮風之而上遂幡然改誼不絳侯之怨是修而修國體抑何厚也劉向所以深惜之而軾不之知也夫誼死而文帝次第用其言誼雖夭不為不用也吾固曰蘇氏之工於揆事急於持論而不盡悉故實者此也書司馬相如傳後司馬長卿不羞其淫奔之卓女而自紀其事使史家傳之以穢後人其文辭之美麗固不能相救而子長復謂其與卓氏婚饒於財故其仕宦未嘗肯與公卿國家之事嘗稱病間居不慕官爵似未盡得其意者長卿固智人也方其一出使而太守郊迎縣令負弩婦翁諛之易恥以為榮而又成闢土之功名於願已滿矣逆知武帝之易封而亦易僇故避而吏隱於文園擁國色發揮文詞以自娛樂不亦泰哉彼其材已試於西南夷武帝固心器之矣使小與公卿國家之事而取通侯之印擁公卿之組固不難其與主父吾丘買臣嚴助輩駢首於東市亦易也王子猷蓋知之是故不取井丹之髙潔而取長卿之玩世者所謂智也書霍光傳後當武帝之末海內虛耗盜賊羣起強藩壯王睥睨於外而博陸宣成侯以宿衛之庶臣無三事九伐之素寄擁八嵗之幼主而御宸極中外之孽不作公私之庾漸充能使其君晏然而信之一日而僇貴主覆悍社收椒宫之祖父與副相之重駢首就屠而亡後言廢一君立一君若承蜩而亡它變此非有沈毅獨斷之略周詳萬全之慮不能也其所以胎禍者驂乘之芒刺而罪至於不可解者宫掖之鴆毒而要之有天道焉武帝雄鷙好殺光固已心儀之少府徐仁廷尉王平之議獄不當而已胡至死也昌邑王之淫亂不足以當宗社之寄即有之其從官坐不諫正削秩禁錮可耳胡至二百餘人悉棄市也王莽之子妄言以莽故寬之可也胡至使父鴆其子田延年之決於廢立功非小胡忍以詐取平直事必置之自盡也凡光所持三尺寧過毋不及是以宣帝一時闕三宇孥僇而無遺齓寧非天也然帝能誅光之子孫而不能盡削光之忠猶像之麟閣以寓其思侯封之續及於旁胤中牢之祀迄於東京則光固有以自剖别哉書淮南厲王傳後淮南厲王驕恣不奉法其所論獄若為黃屋擅拜丞相爵關內侯收聚諸侯王人亡命賊殺無罪人法皆可以死而坐以謀反則未也以文帝時天下若金甌而又最稱理即病狂喪心者亦何敢以蕞爾彈丸之地而與之抗且夫男子七十人輦車四十乘反當何所為也使閩越胸奴以市明珠良馬或有之夫越數千里之外徼荒服之夷虜而為期會欲與其人相應合世固無是理也當是時天下之人實知之以故文帝之賢厲王之暴而尺布斗粟之謡所由起不然而文帝亦何至終愧悔耶其子安之反則有之蓋憤父之死矜已之才而窺武帝之有釁也亦可謂不智矣雖然王安之謀反固也然而未成反也學仙者流則謂王與八公者習不死術而流言聞於武帝帝使按之即與八公俱上升帝恐其為天下惑而别起間如後之戾太子子輿事而稱其自殺以苟完獄耳以故心豔其事竭天下之財力求為神仙而不可得劉向去安時無幾得枕中之遺籍而寶習之此寧非明徵哉獨所謂八公者有左吳伍被雷被夫左吳首禍者也伍被首反者也雷被告變者也雷被用而左吳伍被誅意八公自有人不然吾未見三子之能仙去也班史不當與伍被别作傳當附之安傳蒯通亦不當别作傳當附之韓信傳江充當附之戾太子傳息夫躬當附之董賢傳嗚呼孰謂班史有定識哉書張安世傳後張湯之於安世父子也其才智強記同然而湯刻而憸安世慎而共湯膽大安世小若是乎薰蕕也然而有不可曉者湯廉而安世貪也劉向之於歆父子也其才氣學問同然向為劉氏而攻王氏歆為王氏而削劉氏其忠逆異也他若石碏之忠而厚逆也賈逵之忠而充逆也桓彞之忠而溫逆也黃權之降敵而崇死敵也沈充之逆而徑忠也李懷光之逆而瓘忠也所謂父不得而子者寧獨堯之丹朱瞽叟之舜舜之商均鯀之禹也雖然子可以有不賢父父不可以有不賢子則子尤重哉書漢武帝時功臣侯年表後世稱漢武帝不愛通侯之賞以鼓舞世之趣功名者故能破胸奴滅朝鮮舉甌閩卷南越闢滇蜀而增益天下之半然所謂封侯者殊不可曉而所謂罰者亦未盡當也今夫丞相天子所與共理天下者也固當以賢舉藉以不侯而不丞相固不可以丞相不功而與之侯尤不可也孰若俟其相道得而後侯之乎乃至遂舉之以為例使田千秋以一言而相又緣相而得侯何也卜式請以父子擊南越賞之可也而與之關內侯不可也孰若賞而聽之往功成而後侯之乎欒大一妄庸人耳而遽以之為上將軍而侯之以五千戶之封孰若俟其驗而人主之夀益而富貴之乎大將軍青之破右賢王得其將校人畜至數萬計益封可也而益之至八千七百戶其三子皆襁褓而悉封侯不已濫乎其最後帥師圍單于斬首鹵級萬九千使其王叛而稱其主號而不益封乃至將校俱不得侯何也戾太子自經於泉鳩里之舍男子張富昌踏戶而入令史李夀趨抱解之太子而生侯之可也不生賞之可也胡至聨翩而侯邦題之邑乎上官桀之破郁成得其王於康居而使四騎縛送之二師所恐其有失也騎士趙弟拔劍斬之無可賞也桀不過轉一官為少府而弟胡以侯新畤乎至於罰之不中節尤有可言者荀彘之縛路博德以爭功相疾棄市然樓船之始敗於朝鮮既以左將軍勝而後合兵又陰與敵和非無罪者也公孫遂之往天子知二將之異使正之且許有便宜得以從事遂與左將軍謀而縛樓船非矯制也左將軍誅遂亦可誅乎左將軍即可誅朝鮮平矣獨不可以功贖乎張富昌李夀以太子侯田千秋以白太子寃侯而太子無罪之嫡尚繫之獄何也第所謂罰亦就一侯事舉而及之耳其他死於酷吏之手而決於一時之怒不可屈指數也嗟乎武帝以人主之威天下之力驅之誘之幸而成功名於將亡之敵孰謂其能鼓舞哉書班史酷吏傳後太史公敘酷吏中有張湯杜周以湯逢武帝之忮而道以深文故所以描寫其情狀不遺力即小廉薦士不沒之然不以貴也班氏之稱湯謂能辨當否國家賴其便又云湯周子孫貴盛故别傳噫何足訓哉太史公之誅湯誅意也吾獨怪夫郅都骨鯁廉信士也為濟南守滅瞷氏首惡餘皆股栗而已不如義縱王溫舒之妄殺也為中尉行法不避貴戚列侯宗室側目而視而已又不若溫舒之諂事有勢姦如山不可犯也為鴈門守胸奴不敢犯至為偶人象都令騎馳射之莫能中都固赳赳干城也其罪獨有臨江王詣中尉府對簿欲得刀筆為書謝上而禁弗豫意以為上親子吾不敢廢法又如是而已非有所迎徇深文煅質也身之不免而被以酷名寃矣田延年增車牛直尅資三千萬罪固有之然其為河東選拔尹翁歸等為爪牙誅鋤豪強亦如是而已翁歸能臣也必不為濫刑延年於廢立有大功何至等之酷吏哉郅都死矣寃於太史公田延年死矣復寃於班氏吾以為二史亦深文者書涼州三明傳後余讀涼州三明傳若威明然明皆廉節好讓有將帥材著績中外而皆不免為名使威明尤好之甚至自疏為黨人而上不之問夫明哲保身者固若是乎大將軍武太傅蕃之有朝望志除宦官誰不知之豈有所徵而不知本謀者然明亦不過於生死是非之際一時不能決擇耳既成而始悔辭爵不拜追理武蕃之寃表薦李膺王暢以與閹宦抗雖曰晚矣猶知有不逺復者紀眀真將材也當西羌之為梗鄧隲挾元舅之尊秉大將鉞以天下全力與之角而不勝幾棄涼州熲以孤軍轉戰十餘年長矛徑弩奮其膂力敵為之盡非其材之過人疇克如是晚節與中官比冀以全身而竟身殉之良可歎也陽球為酷吏非有腹心之素一疏而誅中貴人父子立蹴上台奪帝所甚愛而除之漢事故不可測哉書揚雄傳後自孟子歿而有荀卿氏荀卿歿三百餘年而有揚雄氏中間若董仲舒之正毛伏以下之専於其經術若有補焉而未有立言以維持道統者揚雄氏始準周易而為太玄準魯論而為法言法言之所結撰要在於尊周孔辨術經治一時已稱述之至昌黎氏而尊涑水氏而信涑水氏之於孟子不能信而獨信揚雄氏揚雄氏之出處其先亦未有訾之者獨不能不有微恨於劇秦美新而紫陽氏之著通鑑綱目直書之曰莽大夫揚雄死蓋舉市國之褚淵厯姓之馮道所不加者而加之於是雄之名遂涊人之齒頰而其身毋所容於聖門之藩籬矣及考其傳而推之則事不必盡然而情亦有大可原者當雄之遊京師而給事黃門也成帝之世與王莽劉歆並哀帝之初復與董賢並莽賢皆至三公負貴勢所薦引立擢而雄三世不徙官及莽篡漢劉歆輩皆用符命頌功德而雄復不侯以耆老久次轉大夫則其不附王莽可知然所以濡滯而不去者以去則莽必恨之恨之則必追而戮之即不恨必且召而有龔勝之事雄見夫莽雖姧然自唐虞以後所創有而未嘗稱干戈以翦劉氏之社稷而身又不當扞圉之任如是而死孔門之所不載而微箕之懿戚尚且受封於周而謂之仁是以浮沈待盡以存五世一線之息耳至於劇秦美新故不見本傳即有之亦投閣之後不得已冀以瓦全且所劇者秦耳而不及漢所美之新美於秦耳不美於漢也不然涑水氏能斥馮道訿介甫而獨雄是恕乎哉紫陽氏之深意吾固已知之即文中子之賢尚議其僭攻其瑕而宋之統遂接孟子矣何况區區一雄哉書鄧禹傳後鄧仲華有逺識蕭張流也然而非大將材也其心寄雖已篤而齒尚卑名位尚輕戰事尚未練一旦中分六師之半崇以三公之位而委之關中之大敵竊以為光武誤也斯道也髙祖蓋深知之故根本付之酇侯謀畫寄之良平而大將之印獨舒徐焉必待淮陰而後有所歸彼於料已料敵審也夫史稱光武諭河西其將吏皆臣服以為天子明見萬里外雖然此一事耳吾以為明不如髙祖髙祖以數萬衆授一釣者佐以羇旅之降王而不之制裂地以豫未輸膽之大盜而不之惜得一叛王以已之供供焉而不之疑若光武者猜龎萌抑隗囂薄彭寵而致其叛於呼吸成敗之際不為明且逺也我髙皇之善任也實與漢髙並是故韓公誠意迹不蹈行陳而中山開平嵗不絶受脤之託彼皆各當其用也然則善將將者毋若漢髙之與我髙皇也書黨錮傳後黨錮中當以李元禮為第一陳仲舉次之竇遊平擁后父之尊迎立嗣主此不過人臣之常節耳而身改大國一子二從皆封侯握兵縱遂能聲宦官罪而盡誅之何以服其心使無語邪元禮文武材也惜不善用之耳史稱其藴義生風以鼓動流俗激素行以恥威權立廉尚以恥貴勢此三者誠有之夫豈惟非明哲保身之道即所以樹臣節而全國體者亦未當也林宗雖曰遜言危行終享時晦亦是由早逝耳使得及陳竇之變恐亦不能免也諸君猶之可也張元節岑公孝不勝其剛腸肥腦陷府主於大辟而身並亡命元節之所株纍為之捐城委爵破族屠身至數十百所嗟夫是不可為范孟博乎縱不復愧諸死友獨不愧翟超成瑨乎哉且也賢者不必皆黨錮黨錮亦不必皆賢劉景升不臣張邈胡母班不擇比胡以終也蓋十餘年而欲挾匹夫之持論與朝寧相抗者吾不知所終矣書蘇子瞻諸葛亮論後蘇子瞻以仁義詐力雜用而取天下為孔明之所以失而謂劉表之喪昭烈在荆州孔明欲襲而取其孤昭烈不忍其後劉璋以好逆之至蜀不數月扼其吭拊其背而奪之國其與曹操異者幾希矣曹劉之不敵天下之所知也言兵不若曹操之強言地不若曹操之廣言戰不若曹操之能而有以一勝之者區區之忠信也孔明遷劉璋既已失天下義士之望乃始治兵振旅為仁義之師東向長驅而欲天下響應難矣凡蘇子之持論甚至而事甚美雖然吾以為蘇子書生也不識理勢且又不讀書不考其時事夫荆州用武之地孔明之初見昭烈已言之昭烈不得荆州不可以抗曹氏曹氏不得荆州不可以滅昭烈而扼江左之上遊然則曹氏未嘗一日而忘荆州與昭烈也昭烈以左將軍領豫州牧劉表僅鎮南將軍領荆州牧其位在表上特以羇旅相依粗具契誼非有君臣之分也表天子之一刺史非世守之國也表兄也昭烈弟也兄終弟及非過也取之固可否則取之而表琦為刺史而身輔之以拒曹氏亦可昭烈之不忍固仁也而孔明之計非不義也當陽之敗幸而夏口尚有歸又幸而孫權不與曹氏合耳不然昭烈之首已懸之許昌矣吾固曰蘇子不曉理勢也昭烈之入蜀劉璋逆之欲破張魯孔明不在行也其即會而欲掩劉璋者龎統法正也而昭烈不忍也既劉璋微覺之而不給軍食所至以兵守關隘昭烈欲歸荆州而跋尾之不能且立稿矣劉璋焉子也焉不恤宗室之阽危而據險自固朝貢俱廢又擅造郊祀乘輿法物非叛臣而何璋之立未請命也曹氏之拜官曹氏與國而已仗義以討之夫誰曰不宜吾故曰蘇子不讀書又不考其時事蘇子又曰曹操既死子丕代立當操之臨終召丕而囑之植未嘗不以談尚為戒也而丕與植相殘如此其父子兄弟且為寇讐而况能以得天下心哉此有可間之勢不過捐數十萬金使其大臣骨肉內自相殘然後舉兵而伐之此髙祖所以滅項籍也愚以為蘇子蓋不特書生而已一妄庸人囈語也夫自古捐金而間者豈惟漢髙秦始之於趙魏亦有之矣夫秦之間信陵李牧其勢固已如太山壓一卵而當時信使遊客車相錯而無禁髙帝之與項籍兩軍相拒不過數十里信使遊客亦不絶而後皆得以行金而為間今魏蜀之使不通而關譏若戟門誰為之行金兩國之臣非故交誰為之通間且夫丕嗣之三月而篡漢篡之踰月而召植而囚之若孤豚又其大臣皆曹氏之心腹也夫間必自隙入所謂隙者安在也夫守義而責其所當得之吳蜀廢義而言其必可乘之間抑何前後翻覆也吾故曰蘇子者一妄庸人囈語也書諸葛亮等傳後孔明與子瑜為親昆季而公休則從弟也孔明為漢丞相秉國鈞子瑜至大將軍亦參預吳大政而公休仕魏至司空各以身分事三國而不相猜又皆三公也又皆自致功名封徹侯而公休獨不終即世説所載蜀得其龍吳得其虎魏得其狗而公休之望實俱下下矣第考其行事恐公休亦不分為狗也在洛下與夏侯太初齊名為吏部郎中丞尚書皆有望實出鎮夀春使一方肅戢及敗死而麾下數百人無一降敵者且曰為諸葛公死不恨此豈常人所能及哉抑不但公休而已也即子瑜之子元遜其材亦孔明流亞也識度故不及耳元遜事事效孔明孔明相幼主則亦相幼主孔明伐魏則亦伐魏孔明斬馬謖則亦斬朱異孔明責李嚴則亦責李默循迹而效之此其所以愈速禍也且夫山越之收何下於孟獲之禽而淮南之勝亦有光於祁山之捷最後頓兵堅城以疫退舍雖損失亦不至斜谷之敗也其所以人情相徑庭後事遂霄壤者孔明密元遜疏孔明靜元遜躁孔明遂而順元遜遂而倨孔明嚴而仁元遜嚴而刻耳嗟乎孔明之忠漢也與子瑜之忠吳也思逺之繼孔明而死忠也尚之死孝也夀知之亦能言之公休之忠魏也夀不知之矣後世尚能知之而元遜之忠吳也後世亦不知嗚呼夀不唯不知也而列公休於鍾會列元遜於孫峻孫琳不亦寃哉尋元遜之初輔政其聲望赫然每出百姓延頸思見其貌而淮南之役覆魏之全師而取之中原大震其後雖不利亦不至掩前勝也何三月之間而頓失人心以至覆宗僇身為世口實乃爾蓋孫峻之徒畏其嚴忌其盛而搆之少主未必皆實録也嗚呼人固不可以成敗論哉元遜滅於吳而仲弟喬有後於蜀公休滅於魏而少子靚有後於吳其子復顯於晉思逺與子尚俱徇節而季京仕晉為郎天之巧於全賢者後若此書馬謖傳後馬謖之所談攻心為上攻城為下心戰為上兵戰為下雖太公孫武之為法孰能過之然張郃一騎將耳以翼德之寡謀提之而有餘謖用孔明之成師一戰而沮壞不復振者此心戰之論豎儒之所傾聽而街亭之所繇敗也孔明未能盡離儒者是以輕信謖而大用之其後誅謖是也習鑿齒之論孔明得其誅而不得其所以誅也魏延吳懿可用而不用其不平久矣苟惜謖不誅何以使之服自是而更有失律者何以獨行法獨行法則衆議紛然而蝟起不行法則軍氣瓦解而不振謖清談士也寧可以得臣比乎荀林父赦而晉霸得臣誅而不害楚強然則楚亦未可非也載考向朗傳隨亮漢中朗素與馬謖善謖逃亡朗知情不舉亮恨之免官還成都然則謖且逃矣不即歸死司敗捕而後得之不誅何待書陳思王植傳後陳思王於文帝同母弟也文帝即位之二年即風監國謁者論劾其罪召而欲誅之以太后之救而幸免然亦瀕死者數矣蓋以武帝之世有奪嫡之謀而未遂故也而王仲淹乃曰思王三以天下讓夫豈其情哉與楊修善則修為之擬答與丁儀丁廙善則儀廙為之請嗣雖有百口無以自解然丕方矯情自飾而植乃任性以行乘車馳道中與伐吳醉不能受命此雖非臣子之節然觀過知仁亦可以見思王之無意奪嫡而貪功名者如三子輩成之也仲淹殆得其微矣雖然思王之失職成之者三子也而啓之者武帝也考之漢建安十五年司徒趙溫辟丕茂才而坐溫選舉不以實免官十六年始拜五官中郎將而植已封平原侯十九年徙封臨淄侯是時同母之兄任城尚未侯也二十一年而任城始侯鄢陵則思王已加食邑至萬戶又時時對人稱説其才而欲立之豈所以安思王哉不特一思王也鄧哀王沖僅十三而亦欲立之及其亡也乃謂文帝曰此我之不幸而汝曹之幸也噫是何言也厥後任城以強勇毒思王削而移徙藩國若傳舍幽憂疏隔亡異囚竄至使文帝後謂臣下家兄孝廉自其分也若使蒼舒在我亦無天下蒼舒者沖小名也嗚呼孰謂非武帝啓之哉如意不死吕氏而死漢髙攸不斥晉武而斥晉文定陶豫章幸而免耳然亦危矣按魏略又謂太祖疾甚驛召任城至洛而已殂任城乃謂臨淄侯曰先王召我者欲立汝也臨淄侯曰不可不見袁氏兄弟乎然則斯言也王仲淹之所以稱讓任城之所以毒而思王之所以終免也讀徐幹中論徐偉長於七子中不甚錚錚其所著玄猿漏巵扇橘諸賦見推於曹子桓者今多不之見而獨中論十一篇即子桓所稱成一家言者東漢之季其文氣最為緩弱不流暢然頗朴而近於理如幹中論是也視學已自近裏法象猶足禔身然此二者非孟德之所急考偽一章所條為名之弊凡數總而斥之曰盜夫斥之曰盜誠惡之也然而孟德倡之也孟德倡之而偉長斥之子桓以為稱而不之覺嗚呼其真不之覺邪將不滿於孟德邪書陸遜父子及機雲傳後陸伯言一少年書生受脤而據諸將之上揮麈揚䇿破天下之所憚服以為英雄如昭烈者若拉枯朽然後挫北兵奠南服國無亡鏃算不遺籌其孔明之流亞歟而物議稍不及者當由經理內政收採羣情有所未足耳孫仲謀能信之於未試之初而疑之於既成之後非伯言之有勤怠也仲謀有勤怠也幼節德不及羊叔子而才微勝之然能使孫皓緩亡者皆其力哉夫以權之智而不能容伯言以皓之昏而能容幼節者天也士衡縱橫六寸之管而假七尺之壯軀叨三世之將名不能逆自韜晦擁旄非分舉宗覆滅不亦哀哉道家之忌士衡固已知之而又犯之且伯言前後決勝頗以隂謀而幼節之平西陵坑僇無噍類又寧盡天也士龍前後為守令皆著循吏聲然以區區小仁而欲為顛厦之木難矣書羊祜傳後史之所以美羊叔子者至矣其先識不伐則見於曹爽之敗有功不居則見於國邑之辭日與吳競而敵不恨恩施於敵而上不疑餉嵗積而民不告困歿有遺思而久不至忘夫豈直古之遺愛已哉至於宏覽淵識沖度和襟郭遐周顔子之目殆不虛矣雖然吾以為叔子智者也得老氏之精而用之者也若於仁則吾斯之未敢信何以知其然也夫曰慈曰儉曰不敢為天下先曰抗兵相加哀者勝矣曰功成名遂身退天下之道夫此數者皆叔子之所饒有也得俘兒而不殺縛敵將而放歸此非慈乎輕裘緩帶鈴閣之下不過數人此非儉乎一聞開府踧踖不居而讓之三光祿此非不敢先乎追斬敵將憐其死節而厚殯殮之此非哀者勝乎大業垂就而預為容棺之墟以待此非功成名遂身退者乎雖叔子為德於吳厚矣然未嘗一日而忘滅吳則又老氏之所謂將欲取之必故與之者也且夫曹爽樗而魏之族也其志猶有魏也司馬氏材而魏之賊也其志已無魏矣叔子魏臣也何以䇿爽之必敗而逺之策昭之必取而就之陳留王之立也何以不願為侍臣而求外補吏也未幾而何以安為相國從事中郎掌機密也賈充小人也何以出關中而密疏留之蓋䇿賈充之必不成出也凡此皆所謂智也夫仁人者明其道不計其功而吾何敢信焉雖然自魏晉之際未有如叔子之賢者也以司馬氏腹心叔子最賢而尚無後張華次賢則僇而無後然二子尚猶成其名也裴秀次賢則子頠僇而無後王沈不忠則子浚亦以不忠僇而又無後賈充不忠無後而族盡滅何曽稍疏則至孫而滅亦無後嗚呼司馬之德若是而能久有晉哉書阮籍傳後吾嘗讀晉書阮籍傳謂其喜怒不形於色發言玄逺口不臧否人物而又云能為青白眼見禮俗之士以白眼對之由是見疾如讐以為立言者之自相抵牾而不知其皆實録也謂籍以酒全其天非也籍乃以巧全其天者也籍故逆知司馬氏之必篡魏而不欲為之臣與荀勗賈充輩同列而自顧其瓌傑之貌宏麗之文磊落不羈之才欲掩之而不可得司馬氏必知之而且欲用之夫司馬氏欲用之而不為之用必死為之用而不預其謀亦必死死則又不足以成名故托而逃之醉一醉而連綿至六十日彼豈其情也哉凡其卧酒家乞步兵厨甚至於母死而舉二斗酒食一蒸豚自逺於名教之外使何曾輩疾而惡諸司馬氏皆以為不死地也曽言而不用故無他其言用不過廢徙而已不死也然猶慮司馬氏之識之故其乞相東平草勸受九錫章示若為之用者特不勝好酒之一念耳使司馬氏狎而愛之愛而舍之以終保牖下者巧也昔人謂澄公以石虎為海鷗鳥若籍者殆以司馬氏為海鷗鳥也嵇康略知之矣而未能究故雖稱土木形骸不事修飾而時露其鋒距於土木之表此何時也而其與山濤書菲薄湯武之放伐鍾會何人也造康而箕踞待之不為禮且問以何所聞而來何所見而去夫會之來叩籍以時事也亦其見康意也籍醉而不能答會亦當恨之特其所以恨籍者淺而恨康者深也知二子者莫孫登若登故報籍以長嘯而報康以苦辭康下獄而後悔晚矣人不知乃以勸進九錫章短籍按進章不見籍傳而見文紀末謂大魏之德光於唐虞明公盛勳超於桓文然後遊滄海而謝支伯登箕山而揖許由然則風之終讓也非勸進也不然以炎之為壻豈不足為吕公王莽者而至飲一醉六十日而不之許也書周顗傳後周伯仁吾所不解過江以後若使追喪亂之艱難此身之非有或散髮巖阿或栖遲冗列用拙挫名以酒蔽身可也既居九列參密議而縱飲沉湎狂僻廢禮且夫密疏申救始興而不言德固若長者夫以元老故交哀呼求救了不之盼而顧左右云今年殺諸賊奴取金印如斗大繫肘寧能不使之飲恨橫發邪伯仁之死即始興救之久亦必殺但小緩耳伯仁死始興不能無罪檢表而泣以情語諸子猶庶幾哉書周處傳後周子隱感奮時譏折節砥礪文武果亮為時所儀抗忤權戚委命疆圉若無可憾者吾猶謂其為晉而死六陌不若為吳而死無難督也亡國之戚雖足以杜王渾口而吳魏均滅要之百步五十步耳宣佩之勛猶不在子隱下而晚節不固獨彥和首亂而存宣季從亂而旌晉於是乎失刑賞哉議者謂子隱之子孫多愧其先烈吾獨以為之兆也若筵者皎然為君子且有光矣讀書後卷二

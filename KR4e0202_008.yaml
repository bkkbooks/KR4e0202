body:
  text: 讀書後卷八明王世貞撰書張道陵傳後天師一傳蓋因世譜而作其牽合傅㑹不可言請得而條辨之其云和帝即位聞其有道以三品印綬徵是時漢未有三品也徵為太傅封冀縣侯此又因卓茂事而傳之者也太傅位三公上大邑通侯豈平世而遽及草野且此豈細事而史册之不載也神符所受能執筆一遙畫而千萬鬼衆俱死又能使之活則一時西川之厲太上固頥指靖之而有餘又何必縱之為害至極而假手天師制之也陽都之人多深山窮谷王法所不及施故天師以便宜攝之彼地即生齒亦不過數萬耳何以有三萬六千種外道也夫一畫而能殺鬼太上實授之而又責其過當殺氣穢空者又何也張魯以漢中降魏封侯善終史傳甚明而云不受封爵白日升天且曹子建著論稱其時道術之士甚詳而不及魯魯子衛隗俱無所謂竒術者而况上升也且豈有子女十餘輩纍代升天而無一紀者自晉世而昭成而椒而仲回而逈而符而子祥而通而仲常而光而順而士元而修而諶而秉一而善而季文而正隨而乾其壽髙者皆百嵗小亦不下九十何至乾曜召見之後子孫之壽皆與常人等蓋前代系數不明而又少少則不得不以壽彌縫不明則可以影響故也大要與鎮南而後其印劍符籙雖存而未必一一修持其修持者未必一一皆驗至宋真宗之世頗好其事以故稍稍出而應之然亦無可以聳動者至宣政而虛靜先生繼先出其倜儻變幻君臣各相競為文彩而其後人因之有世譜耶真誥雖時時稱天師第呼之曰陵耳亦不甚重之書𤣥風慶㑹録後長春丘真人見太祖於西域雪山之陽所面告者幾三千言略叙師傳之㫖戒以太怒則傷身太喜則傷神太思慮則傷氣而惓惓以節色欲為首旁及保國愛民用賢薄賦之事元太祖性好殺疑其枘鑿而太祖乃歎賞不已呼為神仙錫以便宜金虎符領天下道教夫以佛圖澄之神奇能海鷗石勒然亦危者數四而勒亦不能用其言長春何以得此於元祖耶一說長春能呪瓶水生金蓮花元祖是以信之考譜傳俱不載録者曰移剌楚材疑移剌或耶律訛也其官稱侍臣昭武大將軍尚書禮部侍郎元至至元後始有侍郎亦不屬尚書省此恐誤其二後考湛然居士西征記頗稱長春之短湛然即楚材别號也此移剌者當别是一楚材其三丘長春道門之法嗣也其學實得之禪以片言悟蒙古太祖俾總領其教而其徒不能盡賢往往侵占寺剎以為宫觀或改塑三教像以老子居中孔子居左釋迦居右或皆侍立後四傳而至所謂孟格皇帝用少林僧裕奏辨審得道士李志常等義墮焚化人等經斥道士為僧者十七人還佛寺三十七所又至色辰皇帝再焚諸道經復僧寺二百三十七所塑像悉令改正而道教屈矣昔寇天師謙之以符籙法佐拓拔世祖世祖因而盡廢釋氏僇僧人寇悔而欲諫之則無及矣嗚呼其師為醫弟子蓄毒以殺人師亦烏得無罪哉書真仙通鑑後麻姑壇祠記顔魯公所撰而趙道一倚之撰蔡經傳第其中所云麻姑再拜但不相見忽已五百餘年又說接待以來已見東海三為桑田及姑取米擲地變為丹砂方平笑曰姑故作少年戲也吾老矣不復喜作此狡獪變化然則方平之得道當在盤古氏以前而及其作方平傳云東漢之東海人舉孝廉除郎中稍加至中散大夫孝桓帝時主太尉陳耽家三十餘年尸解而去則方平之再過蔡經家百餘年事耳度其終始不過二百嵗許人而何以老於麻姑又云滄海三變為桑田也豈方平間於東漢時一出耶或别有一方平耶或過蔡經家事有之而傳方平者耳傳其名姓而不嘗見其文耶前傳言鎮青城山丸仙寶室天而後云鎮崑崙亦自相抵牾車子侯扶風人漢武帝愛其清靜稍遷其位至侍中一朝語家云我今補仙官武帝思之為作歌云云按此即奉車子侯也奉車子侯霍去病之子也帝使從封禪太山一夕而死帝思而歌之又語其家道士皆言子侯得仙不足悲案桓氏新論謂武帝惡子侯而殺之今乃以為仙去又不識奉車子侯為去病子而謂之車子侯尤可笑也太極真人杜冲以周昭王二十七年聞文始尹先生登真乃靈宅棲𤣥學道康王特賜金百鎰完葺本第賜號曰樓觀聞老子在周為藏史孔子猶及問禮後始西度函谷尹先生挽之為草五千言今云昭王十七年尹先生得道一誤也康王者昭王之祖也今云賜金百鎰完葺本第二誤也恐係傅㑹不可信又云周穆王好尚黃老崇建靈壇立廟置老君及尹真人像尤可笑彼謂穆王時有老君觀耶又杜冲真以昭王二十七年始學道道成而宗年二十受業焉年一百五十餘嵗至厲王十三年而上升彼謂昭王去厲王時有百七八十嵗耶楚康王事尤誕王翦滅楚已虜其王負芻矣何得復有康王周義山傳是一博暢才人文字然厯引所見諸仙真皆傳記紀載無一創聞至所謂黃老無英白元君則又黃庭經傳世以後語今云是漢宣元時人得道恐未可信費長房以失符為鬼所殺華他以愆期為曹瞞所誅此方術人也而列之仙可乎長房之得符自壺公見范曄漢書甚詳丹臺録云壺公姓謝名元一恐附㑹語劉寬不聞其有仙道特真誥載之路大安傳尤為不經據大安以順帝漢安元年壬午生至晉惠帝永康二年辛酉當為壽一百八十年矣而是時王戎僅七十耳乃謂大安為甥而戎為舅其鹵莽一至此且惠帝永康元年四月趙王倫反自為相國明年正月廢帝於金墉城四月反正改元永寧是永康無二年也惠帝不辨菽惠人也一年之內見廢於趙王倫復辟之後齊王冏專政帝食息不自制而何以能召大安驅禳厲疫所謂上真授記年與名同可以冲天遂以大安元年白日上升然年號實太安非大安也此類殊不一聊辨而志之據真誥陶隱居所紀許黃民原無得道不當列之仙傳也胡長仙事甚奇幻俶儻第在中宗武后朝當逺出葉靜能張果上而史於方術不載又太平廣記搜剔不遺餘力於葉法善羅公逺輩紀載甚詳而獨不及長仙何也得非有所增飾耶許真君除殄妖蛟及拔宅飛升事神奇俶儻足以竦動凡俗照耀一世今遺跡尚存䜟記都在獨晉史搜羅神怪不減虞初旁及義雲而乃遺敬之一不可曉也郭景純之抗王處仲於行刑人及鵲巢樹亦載之而顧絶真君化鴿之跡二不可曉也真君所居既非深僻夀至百三十六嵗白日冲舉家屬門故何止百人而有司都不舉聞三不可曉也真誥揚許所載晉室諸賢逮盡豈有長史係真君從弟而了不之齒四不可曉也陶隱居遍訪仙跡若渴若狂而於真君事獨杳然五不可曉也今者龍沙高過豫章城地仙之事當有驗者而先師曇陽子詩所謂五陵教主世多不能悉而注真君傳者以東門之鎮為宛陵南門之鎮為浩陵西門之鎮為鵲陵北門之鎮為涪陵中門之鎮為泰陵以實其分野太逺而名亦創新未知其是否王子年能預知苻堅南伐之必敗而不能守能預知姚萇之子無略得苻登而不能知身之見殺於萇手此大謬也豈釋氏所謂還債邪將無以述䜟緯談休咎為真宰所罪耶正史不言兵解恐傳者增飾之其所著拾遺記十卷蓋不待畢而知其詭於道也項曼都者誕士也與昔所傳古强蔡京之流相表裏其曰斥仙人者人而指目之耳而以為真仙何無識也徐啓𤣥為王大夫治女金英事怪甚不可言而又涉無謂得非啓𤣥者欲竊其女故為障眼隱形之術譸張以攝之耶蕭子雲據南史以侯景之亂避地而卒今云還蕭山再徙居淸虛館遇神人降言館之東北有都水坑水自東注可以徒居蕭又徙家寓焉歷二紀餘一旦上帝賜玉冊封元洲長史仍司郁木福庭之籍神仙之府八十二口同隱世不復見吾不敢以為的然夫子雲名卿大夫也清虛館在蕭山之近隅非若地肺桃源之深阻也其家八十二口又非一人也何以居二紀而不致人主之旁求族黨之蹤跡其卒之地與嵗史無異書者何也且書家者流必舉子雲以為口實寧有遷化之奇彰彰如是而一不之及意或羽客之棲止清虛者㑹張杜曇永之仙跡而牽引子雲以為童耳吳道子畫蹟雖神奇然是一工師耳正史野史載其出處甚詳且明未有以為仙者而今云得袖仙術周游人間𤣥宗聞而召入宫庭有粉墻數尋俾畫山水道子請用墨漿一缶潑於壁以幕覆之俄頃請上臨視山水林木人煙鳥獸無不備具而且精妙道子徐步指㸃巖下一小洞叩之忽開一童子在側道子奏曰此洞有佳致臣請入為陛下先遂躍而入俄頃門閉守城卒曰道子出矣上再往視所畫處乃瑩壁無復山水何齊東野人誕謾無稽一至此也是不知吳道子之供奉明皇最久畫蹟滿宫禁及長安寺宇也可鄙可笑一至此許栖巖事不可知而所稱對太乙元君引黃庭老莊三語云但思一部壽無窮真人之息以踵其精甚真却似有解悟後令道士算劈太華何神立海橋何鬼又是寐語大約此文唐人傳奇如嵩嶽嫁女南溟夫人之類劉忠州晏所遇王十八事見太平廣記其文典其事亦核但以所好如此所遇復如此而位宰相領鹽鐡不思轉首而取竄僇利令智昏其斯之謂歟嵇叔夜傳謂舜聽佞臣言而殺伶倫八人又云晉文帝令康北面受詔教宫人康不肯從帝殺康於市又一齊東野人矣司空在南北朝為三公齊明帝之世寧有司空張岊耶東昏嗣位日尋殺僇豈有容司空解官令百僚餞送事耶大抵多宋徽時緣飾以乞恩澤者種種皆此類也𤣥真子隱淪之無纍者也幾於道矣然所謂鋪席水上安坐飲酒來往若飛與顔魯公作别揮手上升則正史稗官與吳興掌故俱無之可謂畫蛇之足矣張果宇宙初闢白蝙蝠精也葉法善既以太極紫微左仙卿謫降其格高果逺甚何以一泄果宿因遽殞絶耶明皇月夜事一於西凉州觀燈兩游月宫而其所奉引之人曰葉法善曰羅公逺曰申元之蓋一事一人而所傳聞異辭耳然恐亦誣罔不足信也申元之張雲容事别有傳奇甚詳鄭遨跡極奇然是隱逸之有至趣者也非仙也歐陽子五代史何以遺之談紫霄在五代時巳識得莊列之㫖與釋氏合豈不開士哉辭榮謝施百五十而恬然以解賢於杜光庭逺矣黃損仕南漢時為尚書僕射忽遁去三十二嵗而歸題詩竟去亦奇矣然此詩所云惟有門前鑑湖水春風不改舊時波凡四句皆見賀季真詩恐好事者妄傳之耳崔偉事誕幻不足信灰袋道士張口如箕五臟悉露見酉陽雜爼然巳於舒虛寂傳見之而又皆翟天師乾祜弟子疑必有一誤李升傳與元白飲有絶句所謂誰能無路趣名利臣事玉皇歸上清者鍾離雲房傳亦有之謂為吕先生作當以升傳為是純陽傳不當入邯鄲盧生事邯鄲吕翁開元中所遇也純陽尚未生賀員外傳謂有喬同者少得大風疾去家自棄荒山遇水部教之啖松腴年八十上下水如飛數從水部東游過濰縣元祐初來見蘇子瞻曰吾師嘗游密州識君於常山道中意若喜君者子瞻留之不可又曰吾師以上元期我於蒙山矣子瞻作詩送同并以絶句五解寄水部自是世無有見者考子瞻集有之詩甚佳子由亦有贈然其時有識者云同妄人也元無識賀員外得詩竟去誇於人遂絶不見子瞻陶隱居孫思邈陳圖南三先生皆不能斷九重還往覺陶公微涉有意余素好博綜負才鬼之慕則陶公我師晚來殊厭射欲從孫先生乞數丸藥救道上貧子歸借希夷一枕傳五龍睡法耳水丘子語不多而煞有至理當是得道者王筌傳始遇一婦人乳長於臍曰我蕭三娘也按西京雜記婦人乳垂三尺者北斗中第七星東方朔知之張拱傳載道士語曰神仙以辟榖為下然却粒則無滓濁無滓濁則不漏由此亦可入道子房諸人乃以丹藥療饑固巳迂矣汝欲得此道自此不淫色可也灼然之事吾所服膺余讀宋史林靈素傳怪其誕幻甚口而無它奇術今覽此傳則又甚矣中間有與史不合者故記之傳言靈素本名靈蘁靈素者宣和所賜名也其所稱以術召致劉后事比之少君致李夫人尤怪偉史云靈素謂蔡京為左元仙伯王黼為褚慧而今云蔡京乃北都六洞魔王第二洞大鬼頭童貫則飛天大鬼母勸帝誅之又云與張虛靜侍帝晏游禁中見元祐姦黨碑因與虛靜各俯首致敬上詩云蘇黃不作文章客童蔡翻為社稷臣三十年來無定論不知姦黨是何人帝翌日以示蔡京京皇恐乞出而巳靈蘁居通真宫密室人所不能入京探知其有黃龍帳金龍牀朱紅几案以為僭妄而疏論之上即與京掩入其室則明窗淨几别無一物京乃伏罪而至云即時致西王母降於其室則又誕也史言大水犯都城靈素竭其術不能退而傳云水自太子致但請太子拜之當自退其後復上疏云臣初奉上帝命為陛下去隂魔斷妖異崇大道贊忠賢今蔡京鬼魁童貫國賊任以重權付之兵衛國事不修奢華太甚切忌丙午丁未兵馬長驅腥血萬里兩宫天眷不能保守因乞骸骨歸鄉降詔不允至冬全臺攻之靈素即日封閉賜物携一童子步出國門帝賜宫於溫州居之明年八月朔携奏數托溫守上於朝授弟子張如晦偈而化去先於郭外相墓令於穴下更開深五尺見龜蛇即下棺見五色氣候蓋土即走至百步外俄而山崩石裂不知所在帝聞而震悼賜文而祭之其官曰髙上神霄玉清府右極西臺仙卿雷霆玉樞元明普化天師洞明文逸契元應真傳道輔教宗師金門羽客冲和殿侍宸行特進太宰同中書門下平章事上柱國魯郡開國公食邑八千七百戶實封三千戶賜紫玉方符通真逹靈元妙護國先生云至淵聖即位索取元賜七寶珠尋墓所不可得復有雷電蛇獸之異淵聖大驚使使賜御香設醮致謝封為通真逹靈真人據此傳稱為尚書左僕射趙鼎謫後所撰似必有據而史辭第云食邑實封云云不知政和官制無封邑也皇甫坦即嘗為淳熙定光宗后者淳熙晚見間椒風遏之至死所謂皇甫誤我即此人也此公故有道術然傳不過據碑志諛墓之辭耳陸務觀西游録嘗過其居時有軒輊語姚平仲朱仙事大有紀之者絶類鍾離雲房若此夜功成即不終裹馬革亦當於通侯甲第五欲甕中淹殺蘇養直事蓋别有紀之者非趙所張飾第嘗見一小說忘其名云蘇晚年病殆得丹藥以起與洪慶善云云後竟以老病終亦無所為元日歡飲逹旦披衣曵杖出門馳而立化事也養直少有文行眉山長公嘗為作研銘太陽太隂女几諸仙此稍晦其辭耳列仙傳記之蓋容成素女之術也如楞嚴經所稱堅固而不休息者天地間自有此理亦自有此事第不可為訓耳鈎弋夫人奇女也為武帝所識孕十四月而産昭帝燕齊方伎之餘士尚好言之若以為仙則夢囈耳傳以麻姑為王方平妹尤可笑此事惟顔魯公所撰壇記一見之何嘗有兄弟語紫素元君傳所載任生事疑即傳奇所稱封生也韓太華為韓安國妹二師將軍之婦得道在易遷宫中若二師婦則以巫蠱僇矣意化不在事後耶安國老死者三十年而二師始貴當是最稚妹耳王進賢傳尚書令衍之小女為愍懷太子妃洛陽亂劉曜掠得之渡孟津欲亂之進賢罵曰我皇太子婦司徒公女而胡羌小虜敢干我乎即投河死其婢田六出亦不屈投河死遇嵩髙女真韓西華得度居華陽易遷宫真誥記之甚詳按本傳太子妃字惠風劉曜拔洛陽得之以賜其將喬屬欲妻之惠風拔劍抗詈而死其死節同特死水死刃小異耳惠風以抗劉曜得死而父衍以勸石勒即位亦得死死等耳不有愧其女乎徐仙姑傳僕射之才女年數百嵗常如二十四五人獨游江湖間寓止寺院有惡少數輩欲以刃制而辱之姑笑曰我女子也而能棄家雲水不避蛟龍虎兕豈懼汝鼠輩乎即解衣臥遽徹燭焉衆大喜欲趨之忽皆僵坐口不能言明日姑徐理䇿出山久之乃解姑往來江表顔色轉少其行如飛所至神明畏敬亡敢以非意干者愚謂毋論姑得仙道即之才有女能如此真所謂淤泥中蓮花也第不知少時何以過活花姑為女道士黃靈微也行止亦相類李騰空乃李林甫女人以為疑不知林甫亦謫仙也而况其女乎大抵宰官貴臣多夙生有來厯者要在籍失之耳書陳上陽金丹大要後陳上陽者名致虛元人也道家書幾無所不讀於文雖不能雅馴而亦閎肆辨博成一家語其論精氣神援據法語警䇿動人金丹藥物妙用亦自可采而至鼎器一章所謂偃月爐者必取之女子之身中則謬矣吾獨怪其妄引儒釋狎侮聖言以為其罪不減調逹善星於悟真篇後巳詳言之邇來江陵宜黃尚遭毒手不知二大夫下泥犂阿鼻時亦與此老革相見否書李素菴中和集後余始得此書而讀之覺其緊爽有味其於一切內外丹藥吐納伸經之術如黃庭參同悟真之類皆指以為傍門小道而究其大指多出禪門如四祖啓法融南嶽醒大寂語又雜以中庸飾之大要欲成一家言耳非必有所得也吾所聞如尹蓬頭赤肚子所見如閻蓬頭劉大瓢輩逺者至數百嵗邇者亦自强力飲噉兼人旁門小道行之久久亦自有益第不能出世耳此曹子眉山公所謂啖猪肉者也李先生所謂談龍肉美者也讀書後卷八

body:
  text: 讀書後卷五明王世貞撰讀秦本紀一秦始之惡極矣然其創制立法可紀也稱皇帝罷侯置守令即王族懿親無尺土之奉豈不亦廓然大公哉春秋之時徐有淮夷青有萊夷雍有犬戎義渠豫有三川陸渾之戎冀有鮮虞赤白長狄山戎荆揚之地則無非蠻者其人與鳥獸雜而生堯舜之世化不得過數千里焉荒服之外大抵因俗為教耳秦一蕩洗之而至于今即西北至于朔方遼西無終令支之地南度百粵踰五嶺巴笮滇池亡不襲衣冠而談詩書治禮樂者於乎誰力哉故秦皇漢武不足為人主訓也然而功足言也先王之法有道窮而不得不變者封建也民之為君三年喪也有勢窮而不得不變者井田也古文也於古有益之而善者紀元也有損之而善者肉刑也有略而善者氏族也於乎時哉宜哉宜哉時哉讀秦本紀二秦之取天下而不以道者其罪不在始皇而在莊襄以前之主所以失天下者其罪不在始皇之取而在守也夫秦自孝公用商鞅為功級之賞以誘戰士而使之强七國之民自始祖而至于耳孫其首世世入秦庭而封于涇渭之間男不得耕女不得織士不得拱手而奉先王之業蓋至始皇而天下之所謂共主若赧王者頓首于冀闕之下而周不祀矣其時六國之邊秦者四而其半已為秦有矣秦雖大出兵以下之而非有血戰封觀之實如長平伊闕者也秦之勢不得不併六國六國不得不併而為秦且秦至是非與周代也與六國為代者也夫六國者非僭夷之楚即篡晉之趙魏韓而篡姜之田氏也秦何以不得滅之藉令秦稱皇帝罷侯置守令而輕徭薄稅以與天下相安于無事夫誰曰不可善乎賈生之言曰仁義不施而攻守之勢異也昔人有云湯武逆取而順守之而儒者皆以為非愚以為未可非也夫桀紂者誰之後歟禹與湯之後也商周固世世而臣事之矣桀之二主雖惡然不能出于五服之外而使商周之民盡被其毒也即不忍而誅其君弔其民立其近裔之賢如若微箕者而匡輔之不亦可乎是時夏殷完國也非若赧王之如髮而不可挽者也商周大邦也非若晉宋之伏危而不可退者也聖人與其政之仁而亮其心之無所冀而姑為之稱曰順天應人然猶不沒其實而時見之夫子之不純豫湯武也乃其所以不純貶秦晉也近世有豎儒丘氏者不得其說而輕于持論絀其統而削之嗚呼是身為僭也讀魏志余讀史至魏操未嘗不惡其巧而惜其拙也身佐漢而相之挾天子令諸侯以收四海之權而為魏矣既隂奪而又陽卻之曰吾以臣道終乎何其巧也然而天下莫心與也後世莫口與也舉而名之曰篡嗚呼篡矣當獻帝時董李肇孽拉然土崩海內之欲為所欲為者何限有操亡無操亦亡亡等耳有操後亡則曷不修諸葛之政將之以忠純廓清區㝢奠乂人心而無忘漢也則漢人心而厭漢德魏也則魏不亦明白坦遂哉而顧狼其嗜狐其態屠僇忠舊敖廢儀節至于弒后辱主而後已噫又何拙也雖然魏操無足言也吾所尤惜者劉裕裕非操比也搏國于桓𤣥還已失之晉而後奪之晉無裕已不社矣零陵之弒亦可以已乎丕不害山陽公裕害零陵王其後裔之亡也亦如之嗚呼孰謂無天道哉讀宋史宋所以得稱大繼漢唐者獨其君共儉崇禮讓斬然家範藹乎子惠之政而已其他固不勝晉余得略指數焉藝祖賢非晉武帝比也然而其所以取周則又甚焉武帝藉纍代之業離君臣之分勢不得退而稱臣矣藝祖一殿帥耳固周帝之所卵翼而手足者也一旦乘隙而掩之若承蜩然其何以見周帝地下哉晉鼎革之際其為敵者偏霸之孫氏而宋則遺統之劉鈞也重在劉氏則輕不得不在趙氏也晉自太康中下吳即無尺地不入版者而宋至太宗朝始取太原降兩浙然盧龍十六州之地契丹之割如故也天下固已失九之一李繼遷割銀夏黎桓割交址天下又失九之二而宋之君臣方日惴惴焉奉歲幣而昆事契丹及二帝之北禽也與遺主南竄迹相等也晉之江左其君忘中原矣然未嘗不詔羣雄而擯之宋之江左其君日夕不忘中原矣然未嘗不表金人而君之伯父之晉之亡猶有禪受之迹焉宋亡而銜璧輿櫬再辱王庭抑何甘志絀辱也故宋之治其於漢唐弟也其統于晉亦弟也語統者伸宋則不得獨屈晉屈晉則不得獨伸宋且宋安能越晉而漢唐也或者曰宋至濓洛繼之閩而先王之道秩如也斯其所以為統乎曰仲尼魯人也世卒不以魯先盟主之晉而况濂洛為也彼以為宋重諸儒生乎抑諸儒生重宋乎讀荀子吾讀荀氏書其言性惡禮矯大抵多憤嫉過中之㫖則豈唯小疵已哉至云養心莫善乎誠有味乎有言之也夫誠者真實不妄也對誠之者而言則聖人事也偏而言之則徹上下語也宋儒舉而非之曰既誠矣心安用養邪如以辭而已矣孔子之告哀公曰思事親不可以不知人思知人不可以知天其為荀氏語也宋儒當復舉非之曰是天親而外鑠也是上達而下學也抑何謬戾失序也宋儒之好刺誹古而顓其尊若此又莊子之言曰父子不可解于心君臣無所逃於天地也名言也夫無所逃於天地亦已過矣宋儒復舉而非之夫父子主恩君臣主敬天也人也寧無纎毫乎哉堯崩四海若喪考妣必堯而後若喪考妣也父不慈即瞽叟為吉甫若晉獻者逝而子可無慟哉讀揚子余讀揚氏法言其稱則先哲畔道者寡矣顧其文割裂聲曲暗曶淟涊剽襲之跡紛如也甚哉其有意乎言之也聖人之於文也無意焉以達其所本有而不容祕耳故其辭淺言之而愈深也深言之而不祕也驟之而日星乎徐之而大羹𤣥酒哉乃其矩矱天就矣世之病揚氏以道也余之病揚氏以文也雖然文則又奚病焉讀管子余讀左氏所稱管子大要佐桓公以正如伐楚卻鄭太子辭上卿禮彬彬乎德言君子也即孔子亦稱之曰如其仁如其仁及讀管子一書自定兵制興魚鹽諸大䇿外往往擇卑而易行博小以圖大轉敗以為績巧取而不匱愚其君遂愚其民以愚天下之諸侯使翕然用于吾術而不敢背竊以為戰國之䇿士術史傅㑹而增益之者晚而信其然不謬妄也夫齊積狙之國也戎與楚積强之虜也驟而用齊以王齊必不信驟而加戎楚以王楚必不絀管子善因時者也時至三代人猶純如也及周之衰而人齗齗如也孟氏曰管仲曾西之所不為也而子為我願之乎又曰王不待大文王以百里湯以七十里滕不五十里邪井田之制孟氏之言則既行之矣至於築薛之問而後其技窮也得王而王者周公也得伯而伯者管子也能王而不得王者孔子也不能王而欲王者孟氏也昔宋之南壓於金若卵矣而濓閩之徒日諄諄以正心誠意之說告其君至於用略焉萬一不幸而君任之井吾田車吾兵不踰時而社稷飽敵矣於乎今安得起仲而將相其才使之南治島北却敵徐而置濓洛諸儒於庠序間雅步髙論藻飾其所不足邪讀逸周書余讀逸周書七十一篇未嘗不竒深其文辭而怪其悖也其言甚仁湯而武武曰桀與其屬五百人止不齊民棄之往奔湯凡數徙輒棄湯放桀而復薄三千諸侯大㑹湯退再拜從諸侯之位諸侯莫敢即又曰武王征西方憝國九十有九馘魔億有十萬七千七百七十有九俘人三億萬有二百三十是武王者秦始漢武之靡也王子晉曰吾復三年上賔于帝所以至今稱晉仙去王㑹敘事固典有法然所紀奇民淫殄怪鳥獸抑又何誕也奈何不使人主津津好大哉苐書名汲冢者非按汲冢書晉太康二年汲郡人不準發安釐王出冢書凡七十五篇如紀年瑣語梁丘藏徼書易國語論語篇目杜預序稱太甲殺伊尹事今本皆無之書所載武王斬紂妲己懸頭二太白旗及周公諡法已收之太史公史記中寧至魏始出哉雖然余未獲見汲冢書以為恨而孟子於武成乃僅取二三䇿何也讀家語吾嘗讀家語怪其錯雜不精如所稱商羊萍實於大道奚益也雖然是寧獨無聖賢之言乎哉自宋儒表四子列於經獨尊論語論語行而家語廢乃至如周禮孝經聖人經國盡性之書不得一列學官使諸儒傳習可慨也孟子言仁義闢楊墨其功大矣至于辨理氣之屬論君臣之際未甚徹也有任而發者有矯而致者於經猶月之於日也夫三禮周禮也儀禮也曲禮也今廢周禮儀禮不載而厠之以月令檀弓儒行諸篇抑何輕重失次也愚不揆欲詮三禮而刪其歆莽褒猶之傅㑹者為禮經尊論語而刪其非夫子言者採孝經禮記中庸大學家語之凡為夫子言而粹者别為經以配禮而六之其非夫子言而稍粹者如魯論門人檀弓諸家合為傳與孟子翼經而兩之未敢也聊識于此讀關尹子關尹子九篇劉向所進云其人即老子所與留著五千言者其持論抑塞支離而小近實非深於師老子者也其辭潛夫論衡之流耳不敢望西亰何論莊列至云人之厭生死者超生死者皆是大患也譬如化人若有厭生死心超生死心止名為妖不名為道則昭然摩騰入洛後語耳豈向自有别本邪抑向本遺錯後人妄益之邪夫老子而不為關尹著五千言已耳老子而為關尹著五千言此其非關尹語也無疑讀鬻子鬻子僞書也其文辭雖不悖謬于道要之至淺陋者掇拾先賢之遺而加飾之耳謂禹據一饋而七十起非三吐之巵言乎七十起何其勞也禹得七大夫如杜季施皆非夏氏因生之姓至所謂東門虛南門壖西門疪北門側幾乎戲矣夫鬻子九十而為文王師也乃末篇曰昔者魯周公使康叔往守于殷何哉阮逸僞元經李荃僞隂符劉歆僞周禮固矣猶能文其辭未有如鬻子之淺陋者也雖然使僞而近也毋寧僞而逺也乎近則惑讀列子莊子語多引列子或曰傅㑹之書也此殆不然其持論無以大異莊子其敘事裁而掞辭法則似勝之獨所稱化人見周穆王與西方有聖人語為瞿曇氏之學者往往相引以重至謂其教嘗已行于中國而秦廢絶之噫亦謬矣余謂列子中所載二事與關尹子之言皆非舊文儒而瞿曇學者隂益之讀亢倉子亢倉子其文辭東京之後迂於儒者耳其議則無嘉焉余讀公孫龍雖其謬悠鄙舛而要之縱放强辨儼然戰國之習也僞者多援少倍多拘少劌亢倉子僞書也列子載亢倉子遂有亢倉子家語記子華子遂有子華子賈誼稱鶡冠子遂有鶡冠子嗚呼士之托空名以求傳其言者意亦可悲哉讀鬼谷子劉向班固不載鬼谷子隋志始有之以故讀者疑其僞撰然其命篇甚奇詞亦偉至所以捭闔張翕之機大要出于老氏老氏之以退為進以與為取知白守黑知雄守雌不足求足不大求大雖天下後世之言術者莫外焉深于鬼谷者也鬼谷老氏之所甚諱也儀秦又老氏之所甚諱也雖然不得而終諱以辭其咎夫老氏之於禮猶惜其為亂首而充其說詐而為儀秦慘而為申韓誕而為市大悖而為梁角於乎可勝亂哉按鬼谷子楚人隱鬼谷不著名氏嘗有書責儀秦夫既教之矣又何責焉續仙傳曰鬼谷子即王誗也得道為地仙此諛辭也讀鄧析子鄧析子五篇鄧析子鄭人也或云數難子産之政子産戮之按左氏駟歂嗣子太叔為政始殺析其人不足論其文辭戰國䇿士倪耳循名責實察法立威先申韓而鳴者也至謂天於人父於子兄於弟俱無厚者何哉先王之用刑也本於愛析之用刑也本于無厚於乎誅晚矣轉辭篇與智者言依于辨數語同鬼谷子豈後人傅其㫖苟益其辭也邪要之小人之言往往出于機心之發故不甚相逺耳吕氏春秋記析嘗教獲溺尸者購逆尸者交勝而不可窮固市井舞文之魁也孰謂駟歂失刑哉讀吕氏春秋吕氏春秋其文辭錯出不雅馴往往有類齊諧稗官者其食客所為耳懸千金於市購增損而莫之敢也畏其意故不信其令焉取增損哉儒家者流取其篇首所紀月令厠之經逮今焉甚矣不韋之巧也始而以財役其身隂亂秦裔而不悟也既而以財役其言隂亂聖經而又不悟噫嘻則豈獨不韋罪哉讀韓詩外傳韓詩外傳凡十篇漢人燕韓嬰所著其注詩二十二卷而此則雜記夫子之緒言與諸春秋戰國之說家稍近于理者也大抵引詩以證事而非引事以明詩故多浮泛不切牽合可笑之語蓋馳騁勝而說詩之㫖微矣獨其辭稍明健可誦而所記亦不甚詭于倫物唯謂孔子南游阿谷之隧則類于懷春之吉士而周公之討管蔡激于隱客之一言為大謬耳夫子見狸跡鼠而鼓瑟曾子聞而識其有貪狠之心其然乎豈螳蜋捕蟬之說所由昉乎然以美曽子之察音則可以見夫子之移志則不可甚哉好奇者之易悖也讀白虎通白虎通者漢章帝建初四年詔諸儒㑹白虎觀講議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨决如孝宣甘露石渠故事曰白虎通又按班固傳天子㑹諸儒講論五經作白虎通德論令固撰集其事然則此書為班固筆也其言禮樂名物制度甚詳往往雜取經傳不為背理道而獨于五行之生剋次第悉取人事以配之大抵出于不韋仲舒之緒論而其他立賞罰議褒貶則公榖之義居多至紀封禪而諛心盡露矣吾嘗謂漢之儒多援經以飾事而宋之儒必推事以就經援經以飾事有逺而誣者然而于事濟也推事以就經有邇而當者然而于事不必濟也其濟為雋不疑而其誣至于劉歆之佐王莽噫亦可鑒也讀三墳毛漸序三墳其時皆以為僞書而漸獨信之毋論其淺率而强為古語也伏羲畫連山而有民兵器隂兵妖陽兵妖兵陽陳至䇿辭而曰主我屋室主我刃斧神農歸藏而曰殺藏墓此皆不知其時而妄為說者也隋購天下遺書有劉炫者僞為連山等易百餘卷上之受賞而去後事發坐抵罪所謂三墳者豈即其書也邪讀元命苞右書據以為後周衛元嵩述唐蘇源明傳李江注楊元素由袐閣傳本鏤行而張升以授楊揖者也愚謂此即素撰或張升撰而托者也卦下每作重疊文難字而考之諸字書則易曉其㫖甚淺而於理不甚悖又經傳注若出一人手故以為宋人作也凡唐以前僞書其理駁而時有精㫖其文雜而古其字奇而有不可識者今皆反之故以為宋也乾坤鑿度亦然惟穆天子傳竹書紀年汲冡周書則非秦漢以前人不能也讀衛霍傳昔人稱衛青霍去病傳為太史公敘法之奇者然其論衛將軍曰於天下無稱也去病則曰有天幸不至乏絶而已嗚呼胸奴天下莫强焉其所以數勝而不絀者豈盡天幸邪至伍被之所以奇大將軍于淮南王者又胡無稱也李廣蓋屢戰而屢敗也太史公津津不啻口出焉敘其才力慓果負誼槩饒仁恤指畫軍事若貌也於其勝而幸者如彼於其敗而不幸者如此是可以識矣吾不幸而材不見知於孝武而卒腐以老如公孫𢎞兒寬者二將靡耳奈何雍容取公相為也彼蓋以李廣自况也太史公於游俠刺客貨殖伯夷屈平諸傳皆有所感慨獨於李廣衛霍傳比興之義多吾既深于其指而又惜其以私故掩衛霍摧虜之妙使後人不得尋也讀㑹昌一品集余嘗怪唐中興以後稱賢相者獨舉裴晉公不及李文饒以為不可解後得文饒一品集讀之無論其文辭剴鑿瑰麗而已即揣摩縣斷曲中利害雖鼂陸不勝也當裴公之下蔡也天子之志定將謀合而蔡之亡形成矣公不過一贊其决耳蔡下而天下之望歸焉及其帥河東握都統印環數道之兵受進止而不能取趙一支郡而望若故也一屈于鎛再屈于稹三屈于逢吉四屈于宗閔而望又若故也是遵何道哉文饒佐武宗通黠戞斯破回鶻平太原定澤潞若振槁千里之外披膽待燭百萬之衆俯首而聽一言之指麾國勢尊主威振即不啻屣裴公而上之而及其貶也天下有以為當然者豈盡成敗論邪彼其訿太尉之賞浮則不聞有以司徒匹者譏平泉之觀侈則不聞以緑野匹者又何也裴以誠李以術裴以容李以忮如是而已史稱其一飯必報睚眦必酬夫修别于恩怨若此而豈意其曲擠而致之死地者乃其素所恩之敏中邪何文饒之精爽能見托於令狐而不能快心于敏中也則其鬼固賢于其人也嗚呼才至於文饒而不得稱賢相可畏哉讀書後卷五

body:
  text: 讀書後巻三明王世貞撰書謝安謝𤣥傳後謝安石格量𢎞齊故是始興以上人然大略能因事為功矯情鎮物耳淝水之勝雖曰有天幸而𤣥之善用兵亦自有以制之苻氏滅國十餘擁百萬之衆平襄而後氣噉江左獨𤣥以北府偏師躑躅當鋒覆師斬将者至再三其膽力當何如哉苻氏之亂𤣥乗勝北討而乃使劉牢之應丕而戰慕容垂人皆咎為失策吾以為未為失也枋頭之役慕容垂之威畧能使晉人魄奪丕勝垂丕可掩而取也垂勝丕則不可復制矣蓋不得已與垂合牢之雖勇非垂敵也是故一敗而不復振𤣥病因之豈非天哉書晉史隱逸傳後晉史之傳隠逸者三十五人而合者不十之七范承明魏氏之忠義也辛叔重冉氏之龔勝也龔子偉孝行士也而有俠烈風夏仲御行恠者也而近戲宋令文郭元瑜竊邦之陪臣也戴安道末世之通士也夫隠逸者夷穆而近道遯晦而挫名孫公和董威輦郭文舉索偉祖陶處靜其至矣哉譙元彦朱臣容楊軻次之軻之不幸而不得死非自致也劉子驥之仁也而不能忘跡也陶元亮之達也而不能忘言也夫所以不能忘者名之根也又次之矣雖然元亮之所為次以隠第附于節為近書范承明傳後余觀自古忠臣介士之於故國未有如范粲承明者其持志烈於微箕保身巧於夷勝夫口舌步武之際人所最難檢攝持而至於三十六年之久卒以天年終此豈慷慨殺身可同年而語哉且其不辱在廢立之時而不在於移鼎之際沈幾先哲雖聖賢何以加焉伯孫以𢎞博之資率其二弟棄學業屏人事而奉承明沒齒不官可謂生能養志沒能繼志者也養志繼志孝之純也奕世不屈忠之純也伯孫有焉武帝優容之而不忮不奪其猶有君人之度哉傳稱太宰從事中郎誤當時未避師而稱太宰亦無官太宰與太師人也書慕容盛載記後吾嘗讀慕容盛載記其與羣臣言管蔡忠存王室而公代主非人臣之道故言公将不利于孺子周公當眀大順之節陳誠意以曉羣疑而乃阻兵都邑擅行誅僇不臣之罪彰于海内至伊尹則又謂其不能竭忠輔導而放黜桐宫事同夷羿何周公之可擬夫盛一小猾虜也乗險而據一方屢遭簒弑之後故其與羣臣議摧抑伊周以張威而折其心之不軌不足據也獨蘇子由之持論以世之言為周公之事無以異于伊尹然天下之人舉皆疑而不信夫天下之大成王之不明而周公攝則是周公未有以服天下之心而强攝焉以為之主也夫人臣而用天子之事此天子之所忌也以一人之身上為天子之所忌而下為左右之所疑大臣從而媒孽其短此古之忠臣所以盡心而不免於禍而世之姦雄之士所以動其無君之心而不顧者也然使成王用事於天下而周公制其予奪之柄則愚恐成王有所不足乎其心而管蔡之徒乘其間隙而間之以至于亂也使成王有天子之虗名而不得制天下之政則愚恐周公有所不忍于其中赧然有不自安之心也是以寧取而攝之使成王無異乎其間以破天下讒慝之謀是以其後雖有管蔡之亂而天下不揺蘇氏辨矣然亦非能善論周公者也夫武王殁而成王尚幼周公用叔父之尊親而當武王之重托以御初服之天下使退而躋于畢召之列則五服之外人得以幼主而易成王故負扆以朝諸侯使天下曉然知成王之為君而周公之為攝又不欲以萬機之衆而撓成王蒙養之哲使之從容以成其徳而練於政知其必克負荷也然後稽首而歸之若信蘇氏之論則七年之内将以攝為真而天子之名不歸之成王而歸之周公此新莽之所妄引以成其簒者也而謂周公為之乎且蘇氏之所疑于不能服者即霍光之于昭帝諸葛亮之于後主也天下尚不疑于霍光諸葛亮而獨疑于周公萬萬無是理也周公之過陳賈則一二測之夫洛邑之頑未嘗一日忘怨周而為殷武王之黄鉞固已斷紂之頭而懸之太白矣乃使其憤怨很戾之子為之長而又使其失職之兄不肖之弟而監之不亂何待且夫紂之自絶于商久矣武庚親其子也頑民挾而欲甘心倒戈者畏而有二志皆非所以寧之也微子者紂父之元子也而賢滅商之後即立微子可也或曰封武庚者武王也非周公書謝靈運集後余始讀謝靈運詩初甚不能入既入而漸愛之以至于不能釋手其體雖或近俳而其意有似合掌者然至穠麗之極而反若平淡琢磨之極而更似天然則非餘子所可及也鮑照對顔延之之請隲而謂謝如初發芙蓉自然可愛君若鋪錦列繡亦復雕繢滿眼也自有定論而王仲淹乃謂靈運小人哉其文傲君子則謙顔延之有君子之心焉其文約以則此何說也靈運之傲不可知若延之之病正坐於不能約以則也余謂仲淹非能知詩者殆以成敗論耳書何𦙍傳後甚矣士之好名也天監之初何𦙍與謝朏並召不出則已何至示必出之勢以動謝朏而身獨隠以擅一代之髙毋乃傷于巧哉世固有巧而競于進者未有巧而競于退者雖清濁異形其累自然一也雖然謂謝朏為𦙍所賣則非也丈夫自有志安可以出處問人𦙍盖已逆知之矣故曰興王之世安可久處兹言也固朏之所樂聞也齊氏禪代朏僅能不為褚彦回王仲寳耳孔子有言血氣既衰戒之在得朏所至以聚斂聞何暇論晚節哉書爾朱榮傳後昔爾朱榮死而魏收為之志受其子文賂金而比之韓彭後人笑而嗤之吾以為韓信神于兵者也固非榮之所敢輕擬至以方彭越則榮方且憤然而不受夫以榮挟虜姓而肆為暴戕宗室屠王公掠妃主戲天子於股掌之上而不之顧擢髮不足以數其罪然至于雄武抗悍有經世略則自項羽而後未見其比者也榮秀容一酋長耳地方不過三百里兵不滿萬騎然能收募天下之豪傑悉出其麾下其志遂欲掃羣䧺而制六合之命天下亦悚然而畏服之且其始之入洛不過五六千人耳而六師之乗萬雉之都拉然而土崩其破葛榮亦不過七千人耳而百萬之衆一朝而潰敗雖成如元顥才若陳慶之而取之如拉朽然至于處分大盜之速遥䇿闗西之勝隠然阿瞞寄奴之風何言彭越也羽之喑啞跳盪非榮所可及然羽有近算而無逺略寛于近而薄于逺故嘔嘔之愛能使二十七騎於烏江而不忍去而不能使田榮陳餘英布之無叛所當之敵戰必勝攻必取而不能保曹咎龍且之無敗而所遇又髙祖是以禍不在内而在外榮有逺略而無近算寛于逺而暴于近故葛榮之衆不坑僇而左右之無辜而死者比比能使天光之以少制万俟醜奴侯淵之以少制劉靈助而不能察元彧軰之謀而所遇又莊帝是以其禍不在外而在内嗟乎古之有天下者要必有人君之徳而其佐命以功臣終者要必有人臣之體人臣之體在才巨而心小其識不凡而凡不逺而逺乃可保也無君徳而其材非人臣者偏雄則項羽袁紹李宻委質則韓信及榮也其法不足以有天下適足死耳他固有幸而成者不足道也讀文中子立言之士自吾夫子諸髙弟顔閔參賜外要無若孟子自孟子而後則無若文中子矣夫析理性辨邪偽精微入𤣥沈快破的故瞠乎不敢望鄒人之籓若衡事隲古簡要精當河汾之間裕如也奈何以模擬少之第昔人謂文中子之髙弟子房杜李魏諸賢皆顯貴為貞觀将相而未有一言及其師以為疑若余不佞之所疑固不止是盖夫子大聖人七十子之徒其齒莫重於顔季二路然未有長於夫子者至攷房杜李魏諸賢皆北面而事文中子而皆長於文中子文中子以開皇四年生以大業十二年卒夀僅二十三今李衛公以貞觀廿三年卒年七十九魏鄭公以十七年卒年七十三當並長文中子十六嵗也房梁公以貞觀廿二年卒年七十一當長文中子九嵗也杜密公以二年卒年四十六當長文中子四嵗也它若淹若威若州達即不可攷要之其齒皆不卑于房杜者文中子固十五而抗顔為人師然豈必處處作項槖哉將文中子之微言固不止是而好事後進有勦入而亂其真者耶若以為阮逸偽作則斷乎非逸所能辦聊志於此以示傳疑書李勣傳後髙宗之欲廢王后而立武也褚遂良諫長孫無忌不諫然猶能持之李勣不諫又從而㬰之武立而後易社移鼎誅鋤李氏之裔殆盡而天下之惡悉歸之勣吾謂未可以是深罪勣也夫勣也智有餘者也以為人主以愛欲易椒房吾必不能制制之而不得則禍隨之吾勛臣也禍不至死不已彼見夫太尉之懿親且有翼戴功以卑辭竄荒裔而卒賜之死方自以為得策而詎謂武氏之遂滔天也假令武氏前髙宗死即後死而不臨朝不廢立不易社移鼎勣不過一具臣而已家事語亦不必傳也且夫勣故盜賊雄也為父而事竇建徳則失之君為身而復事唐則失之父特以其能善為兵事曉便宜而已柰何以大臣之節望之夫吕后之王諸吕其安危大幾甚于易后王陵曰不可平勃曰可幸而為平勃不幸而為李勣不然何以異哉然是時吕后髙宗之意定矣諌必不行不行則禍隨之為大臣者取幾焉可也書五王傳後張柬之等五王合謀誅二張遷武氏反中宗之辟而復唐之宗社何其壯也未久而妖韋蠱於内諸武蠱於外而五王者厭厭不振以至于屠滅千載之後疇不痛之而又惜之且恨之胡寅仲以為五王於是時當乘兵勢執武氏而聲其簒奪之罪以僇之可也張敬夫曰固也中宗子耳子可以弑母乎為五王者廢中宗立宗室之賢者伸討賊之大義而僇武可也朱子曰固也宗室盡於武氏手矣其存者皆愚暗不可恃也愚謂五王之所以能用其衆者以中宗耳復中宗以思太宗耳宗室之僅有存者非直愚暗也又皆非太宗後即欲復唐之宗社而不稱中宗誰則應之廢中宗而立踈逺者誰則信之當是時乘兵勢而悉捕之武之族無少長皆僇之如吕氏例可也如是而武氏在上陽聞之當亦自不良死即良死可以無後患也若夫中宗之暴昏而妖韋與其女之淫忮則天也五王固無如之何也已書李光弼傳後史思明亦悍胡也其材力逺出禄山上李臨淮之角之凡兩大勝一大敗其勝者皆用寡而敗者乃用衆用寡之勝皆乗險謀豫以忍而屈之野戰則敗郭汾陽之始能用衆而不能用寡即用衆亦未必決勝也晚節之捍吐蕃回紇始乗險謀豫以忍而屈之故不敗而卒為宗社之元臣惜哉臨淮之有功名而不善居之也凡臨淮之才畧心事與陶士行畧相當其治軍臨淮為最治民士行為最臨淮不幸而與河北之藩鎮近士行幸而與温太真合而見推挽不至作愧憤死噫嘻亦數哉書李晟馬燧傳後李西平渭橋之役以一旅弱師介於二鴟梟之間卒能勉强激勵以成補天浴日之烈此非特其忠志强忍殊也蓋亦有精思焉夫西平之一決隃於郭汾陽多矣然其量稍隘意稍滿故輕發於後貴之延賞而卒為其所制延賞雖忮非魚朝恩元載比也以為西平之處延賞不若汾陽之處朝恩元載也馬北平材力亦陶士行李臨淮流亞也知有身不知有社稷是故與西平霄壤焉徳宗之世有西平陸敬輿故不亡急而用之緩而棄之故不振嗚呼哉書李鄴侯傳後自三代而後人臣出處之蹟未有如李鄴侯泌之竒者也或伸而屈或屈而伸或先幾或忍詬其保身亦未有如鄴侯之巧者也七嵗而以童子薦入禁中與宰相張九齡諸公善竒矣尋謝去游嵩華終南間求神仙不死之術又奇也久之復以獻議入翰林從太子諸王游太子善之又奇也為詩以譏楊國忠安禄山斥置蘄春又竒也太子即位靈武為肅宗使人召致泌泌忽間關来謁又竒也立談而叅帷幄體輔若一拜右相辭俄又賜金紫為侍謀軍國元帥行軍長史亦將相任耳又竒也復兩京迎上皇除道清宫泌皆任之甫功成而辭榮乞歸以避李輔國又竒也當是時廣平王以太子領元帥泌竂也師友也即位為代宗召泌舎之蓬莱閣强以㛰娶食肉又竒也然其重已不及肅宗矣元載忌之出為江西觀察判官判官一下佐也泌不辭而往乂竒也載誅而復召常衮忌之出團練澧朗刺杭州又不辭而以吏治顯又竒也嗣帝為徳宗避泚奉天復召泌而用之則直臣之而已又出而觀察陜虢鑿饟漕之道翦淮西之逆又竒也自是始登相位天子恭已委之不復設他相以至終其身又竒也至徳之初郭汾陽李臨淮貞元之際李西平馬北平其建勛克復若異代然而皆保全於泌之手又竒也夫以輔國忌之載忌之而不能傷衮忌之而不能終抑則泌之巧所得於老氏者深矣其所進深謀秘計以聴者之中庸不能盡售然至於處父子兄弟之間功亦不淺矣書鄴侯家傳後鄴侯家傳者故唐丞相李泌孫蘩所撰也蘩才而躁嘗厯仕至方伯討賊有功而以贓論死當下獄且論報自度不得免恐死而先人之蹟且泯泯故成此傳其所紀獲遇肅宗且相而遽引避再遇代宗且相而復引避獨最後遇徳宗不能免相以終而中間預收復二京䇿平淮西叛卒其事甚竒至於保䕶諸皇前後者二則留文成之所不如矣司馬文正纂通鑑悉收載之而宋景文之於唐史畧焉豈宋以史筆貴覈而司馬志在資治姑取益時政耶泌既好誕蘩復有加焉可以類推矣史又謂泌以好譚神仙為世所譏雖然不可謂無得也晚而拜相卒死繁劇將無自夭其天年也耶泌辟穀文成亦辟穀乃卒不終辟者何也富貴之可愛甚於死之可畏也書常衮傳後常衮唐之賢宰相也獨其與崔祐甫忤而奏斥之逺州為過耳其所與忤之繇不過也夫寛詔天下吏人三日釋服祐甫乃固執以為辭欲令公卿大夫亦三日釋服者何也衮云禮臣為君斬衰三年漢文權制猶三十六日唐髙以来皆遵之至𤣥肅之䘮始服二十七日古者卿大夫從君而服皇帝二十七日除在朝羣臣亦當如之衮之言何其秉禮經正哉充祐甫者不獨倦為臣且導徳宗倦為子者也自元載王縉之執政官以賄成衮思革其弊杜絶僥倖四方奏請一切不予而不無壅真所謂人臣能任怨者祐甫以遂客執大柄欲收一時之物情而矯之至二百日而除官八百人豈能無容狥也宰相之禄厚矣而又有堂封以供餐費堂封矣而又日給内厨御饌可食十人此固元載王縉之所貪飫而衮之所不一日安者辭日給當矣辭堂封亦未為過也當魚朝恩之領太學也衮時在散僚獨以為不可上用生日納諸道節度使金帛珍寳器馬直二十四萬緡衮又以為不可曰彼諸道者豈能男耕女織不過横取之民斂怨求媚耳此二者舉朝之所若喑而不敢言者也而衮眀言之自衮之相也與綰同一麻皆不為載縉黨明也既貶之後不以故相自尊佚所蒞皆有聲績其觀察七閩教民陶瓦以易苫蓋無火災誨子弟習經術通藝文易世之後彬彬比於上國其功豈在李冰文翁下哉寡陋豎生槩以苛碎目之過矣書李白王維杜甫詩後吾嘗謂太白之絶句與杜少陵之七言古詩歌當為古今第一少陵之五七言律與太白之七言詩歌五言律次之當時微覺於摩詰鹵莽徐更取讀之真足三分鼎足他皆莫及也天子蒙塵於蜀少陵敘致有慷慨惻怛無窮之感而太白乃作上皇西巡歌得非有胷無心者地轉錦江成渭水天迴玉壘作長安雖或壯麗千古何異宋人東狩錢塘封事永王西巡歌彼誠以永王為中興之賢王也辭官不受賞其語誰信摩詰弱故不能致死安民然其意非肯為之用也生平悟禪理舍家宅無妻子而不之䘏顧不能辭禁近以歿豈晩途牢落不能自遣白香山之所謂老將榮補貼者耶書韓文後韓公於碑志之類最為雄竒有氣力亦甚古而間有未脫蹊逕者在欲求勝古而不能勝之舍而就已而未盡舍耳奏䟽爽切動人然論事不及晁賈談理不及衡向與人書最佳多得子長遺意而急於有所干請於人則詞漫而氣亦屈記序或濃或淡在意合與不合之際終亦不落節也第所謂原者僅一原道而所謂辨者僅一諱辨而已不作可也盖公於六經之學甚淺而於佛氏之書更鹵莽以故有所著釋不能皆迎刄也而他彈射亦不能多中的謂之文士則西京而下故當以牛耳歸之書栁文後栁子才秀於韓而氣不及金石之文亦峭麗與韓相爭長而大篇則瞠乎後矣封建論之勝原道非文勝也論事易長論理易短故耳其他駁辨之類尤更破的永州諸記峭㧞𦂳潔其小語之冠乎獨所行諸書牘敘述艱苦酸鼻之辭似不勝楚揺尾之狀似不勝屈至於他篇非掊撃則夸毗雖復斐然終乖大雅似此氣質羅池之死終墮神趣有以也吾嘗謂栁之蚤嵗多棄其日於六季之學而晚得幽僻逺地足以深造韓堂奥便超六季而上之而晚為富貴功名所分且多酬應盖於益損各中半耳書王叔文傳後王叔文以永貞元年之二年順宗即位自東宫而拜起居舍人翰林學士王伾為左散騎常侍依前翰林待詔三月伾亦為翰林學士叔文為度支鹽鐵轉運副使五月加戸部侍郎使如故三五日一入翰林去學士名七月叔文母䘮去位伾得風疾八月上傳位皇太子之明日叔文貶渝州司戸伾貶開州司馬又二日上即位九月出其黨韓泰韓曄栁宗元劉禹錫吕温等為外州刺史伾死貶所明年賜叔文死泰等復貶逺州司馬嗟乎叔文以不良死而史極意苛讁以當權姦之首至與李訓軰齊稱抑何寃也伾貧不足道也叔文以一言而合順宗然亦未為非深思逺慮而至順宗即位之所注措如罷宫市斥貢獻召用陸贄陽城貶李實相杜佑賈躭諸耆碩皆能革徳宗大敝之政收已渙之人心而其所最要而最正者用范希朝為神䇿行營節度使而韓泰為司馬奪宦官之兵而授之文武大吏卒為宦官所持不能全身亟貶而至矺死盖其事之最要且正而禍之烈實由之即劉闢為韋臯求三川而許以死相助金錢溢於進奏之邸叔文小有欲寧不為所餌顧叱而欲斬之抑何壮也臯時已逆知叔文之失宦官心故敢抗䟽直言其失而亡所顧且神策諸将尚為啓以辭宦官使之知而激其怒何况裴均嚴綬輩也均綬素附中人者也其所用韋執誼韓泰等固不能盡當執誼鄙亡論然亦以文學為徳宗之寵臣而泰等則天下之所謂名儁有才識者也觀栁宗元寄所知書謂與罪人交十年則必不趣勢而後合又云早嵗闕始竒其能謂可以立仁義興教化則又不必為富貴而求顯獨史所云互相推奬曰伊與周曰管曰葛僩然自得謂天下無人又云叔文及其黨十餘家晝夜車如市候見叔文伾者至宿其坊中餅肆酒鑪一人得千錢乃容之此事則醜而不可掩而宗元又云素卑賤暴起領事人所不信射利求進填門排户百不一得一旦快意更造怨讟此最為實録而苟非賢人君子則亦勢之所必至也嗟乎叔文誠非賢人君子然其禍自宦官始不五月而身被天下之惡名以死死又至與李訓輩伍寧不寃也夫訓非叔文比也即使幸而勝之失一仇士良而得一仇士良何益也書五代史後歐陽公作五代史而欲自附於春秋之筆削創立義例而其文辭頗為世所喜楊士竒稱之以為與司馬遷史記班固漢書並而義例勝之予亟攷其所謂義例者亦不為甚當如朱梁石晉郭周皆起於叛臣前後李唐皆起於夷狄劉漢起於負國之大鎮不過因其繼唐室之綂據中原之地其大者尚不能半天下小者三分之一而延世不能過三紀年或僅四五亦何必盡倣古帝王之例而全予之李昇王建劉巖之類乗時鼎峙去全忠輩等耳又何必盡用僭竊之例而全削之死節死事之人相去不甚逺而分為二劉旻之為漢何不以附於知逺後而别為國至於文辭尤索寞腴不如范曄雅不如陳夀比之兩晉六朝差有法耳尚不能如其平生之所撰碑志而何以齒史漢哉一安重誨傳少欲間以議論而痕跡宛然詞㫖沓拖去伯夷屈平霄壤矣士竒之論私其鄉前輩耳而耳觀者羣和之良可笑也書馮道傳後嗚呼五代之亂極矣為之臣子者抑何其不幸也諸方之僭竊無論已為唐而遇朱温一死也為温而遇友珪一死也為友真而遇存勗一死也為存勗而遇嗣源一死也為嗣源之子而遇從珂一死也為從珂而遇契丹一死也遇敬塘一死也為敬塘之子而又遇契丹一死也為知逺之子而遇郭威一死也為郭威之子而遇匡𦙍一死也逺不及十年而死近不及三載而死内不免以帷幄死外不免以節鎮死徼而兵死野而盜死不知何以處死也馮道一椎魯士耳歴相十餘君而不死此何故哉遇治則入遇亂則出入則必相出則巨藩位三公爵真王而卒以令終彼非能賄免也非阿䛕取容也又非有布衣之故也彼盖得莊老之術而善用之夫不忮不畏不名不術推分任真此六者莊老之所貴也而夫子之所謂似而惡其為鄉愿者也雖然寧獨一道哉如竇真固李濤李昉李琪之流皆類之獨道以著得貶耳然則為道而死者必擇以死之日而後可書趙普傳後趙韓王不讀書而片語鑿鑿破的如勸太祖收諸將兵權云陛下何以負周世宗勸太宗破金櫃之約曰太祖已誤陛下豈容再誤是何必多多許亦毋論本意若何令人那得不轉圜竊尋自古得天下之易未有如宋太祖者陳橋之變焉得諉非本謀盖太宗與普謀之於外而太祖陽示無心於内此事獨普三人知之廷美當尚弱弗與也太祖之傳太宗約再傳而始及徳昭亦非本心也知徳昭幼而太宗之不利孺子也太宗可以倍廷美而不可倍徳昭當真宗之正東宫徳昭雖物故尚有子而一時在廷諸臣未有一言及之者寇準窺微指之所在而請決焉此何足美而一時與後世之人亦未有訾之者何獨於應禪之景皇無責之于肅愍而過為刻也故余每讀宋史至太宗令人思吳乞買至趙普令人思尼瑪哈嗚呼彼亦有人心書歐陽文後歐陽之文雅渾不及韓竒峻不及栁而雅靚亦自勝之記序之辭紆徐曲折碑志之辭整暇流動而間於過折處或少力結束處或無歸著然如此十不一二也獨不能工銘詩易於造語率於押韻要不如韓之變化竒崛他文亦有迂逺而不切太淡而無味者然要之宋文竟當與蘇氏踞洛屋兩頭曾王而下置之兩廡讀朋黨論朋黨之說盖自古有之曰君子與君子以同道為朋小人與小人以同利為朋此勢也亦理也歐陽氏獨曰小人無朋以為朋者偽也及見利而爭先或利盡而交疎則反相賊害雖其兄弟親戚不能相保故曰小人無朋君子則不然所守者道義所惜者名節以之修身則同道以相益以之事國則同心而共濟終始如一此君子之朋也蘇氏復為之續曰君子以道事君人主必敬之而疎小人惟予言而莫予違人主必狎之而親疎者易間而親者難暌也而君子不得志則奉身而退樂道不仕小人者不得志則徼倖復用唯怨之報此其所以必勝也歐陽氏之說則慮君子之黨見疑於人主而求所以釋之蘇氏之說則慮小人之黨見信於人主而求所以勝之斯二說者皆得之而未能盡者也凡為君子而純者必不為朋黨者也曰夙夜匪懈以事一人而已曰中心無為以守至正而已凡為小人而純者亦必不為朋黨者也曰見利則趨利盡則散而已其為朋黨者有之不純乎君子與不純乎小人者也不純乎君子者有君子之節而不能盡去其累所謂累者三曰近名曰好勝曰快心士固有批鱗蹈刃出萬死而成其是者一念之名根未除則士之務為可喜可愕者入之而為黨若東漢之三君八俊八厨八顧之類是也宋光寧之際賢者亦近之曰好勝其人雖跡為君子而一議論之不合則各持此之是以求伸為徒者傅益之則摘彼之非以求其屈若宋洛蜀閩之類是也而唐穆文之際不盡賢者亦似之曰快心則忿小人之為奸與其黨類之貪横甚至冒酷吏之法而翦除之伏機反中其禍繇身而及國若黨錮諸賢於宦者是也不純乎小人者三曰無君子之實而慕其事其心乃欲得小人之利而已如唐之八司馬者其與伾叔文比而驟貴則非其欲奪中人之權而革貞元之政則是此不純小人者也以小人之爭起亦以小人之利合而時時見君子行若徳裕之政術僧孺之却賂栖楚之直言此亦不純小人者也二者皆易察識者也若乃陽竊君子之似而陰用小人之術以其可喜可愕者中君子之好而愚之其君子幸而覺則彼得持君子之疎而投之禍不幸而不之覺則君子亦浸淫與之俱化蕩而無所歸陽則以其似而收天下之譽陰則以其實而市天下之權緩之則肆然而来以與君子同其進急之則忽然而匿不與君子同其退又急之則甘心為婦寺之吮䑛盡棄其故而了不之恥此於古或有之我未之見也凡朋黨者先王之所不能廢也而恒示之戒其於朋也為書之像形也若風之襲羽而弗克正也故書醜淫朋易美朋亡又曰君子羣而不黨而歐陽氏蘇氏若以為善而汲汲乎求白於人主者何也凡君子必無朋黨君子而不純者有之然多不勝小人必無朋黨小人而不純者有之然多勝勝則足以憂君子而傾人之國然至於能奪天下之公議壊天下之人心者則未有過於陽竊君子之似而陰用小人之術者也書王介甫文後介甫於文章頗能持論近道理而好以已勝至於語務簡而意務多欲以百餘言而中為層疊宛曲其所長在是而其所病亦在是也誌傳之類亦刻削有矩度而好為小巧於字句間立法此所短也吾嘗謂介甫於字說其初不無一二㑹心者遂欲字字而為之說此其所以貽笑猶之治鄞非不足以阜財而得民遂欲行之天下此其所以流毒使介甫而實其行虚其心崇其智卑其禮則君實固瞠乎後矣書曽子固文後子固有識有學尤近道理其辭亦多宏濶遒美而不免為道理所束間有闇塞而不暢者牽纏而不了者要之為朱氏之濫觴也朱氏以其近道理而許之近代王慎中輩其材力本勝子固乃掇拾其所短而舍其長其闇塞牽纏迨又甚者此何意也毋論子固即眀允子由介甫俱不足與四家列而稱大若名家者庶幾矣讀書後巻三
